<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ v2.2</title>

<style>
body { margin:0; font-family:sans-serif; background:#f2f2f7; overflow-x: hidden; }
.container { padding:10px 10px 110px; }

/* タブバー */
.tabbar {
 position:fixed; bottom:0; width:100%; display:flex;
 background:#fff; border-top:1px solid #ccc; z-index: 100;
}
.tabbar button { flex:1; padding:25px; font-size:18px; border:none; background:none; }

/* カード・グリッド */
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.card { 
  background:#fff; border-radius:12px; overflow:hidden; 
  box-shadow:0 2px 6px rgba(0,0,0,0.08); position: relative;
  display: flex; flex-direction: column;
}
.card img { width:100%; height:80px; object-fit:cover; }
.card-info { padding: 6px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
.card-title { font-size:11px; font-weight: bold; line-height: 1.3; word-break: break-all; margin-bottom: 4px; }
.badge { align-self: flex-end; font-size: 9px; color: #888; background: #eee; padding: 1px 4px; border-radius: 4px; }

/* ボタン共通設定 */
button:not(.tabbar button, .chip, .sort-btn) { 
  min-height:44px; font-size:16px; padding:10px; border:none; border-radius:10px; 
  background:#e5f0ff; color:#007aff;
}
.btn-red { background: #ffe5e5 !important; color: #ff3b30 !important; }
.btn-green { background: #e5f7e5 !important; color: #34c759 !important; }

/* 削除ボタンのサイズと隙間を調整（修正ポイント） */
.delBtn {
  min-height: 32px !important;
  height: 32px; width: 32px; padding: 0 !important;
  display: flex; align-items: center; justify-content: center;
  background: #eee !important; color: #ff3b30 !important;
  border-radius: 50% !important; font-size: 18px; flex-shrink: 0;
}

/* フィルタ・ソート */
.filter-bar { display:flex; gap:8px; margin:10px 0; }
.filter-btn {
  flex: 1; padding: 8px; border-radius: 10px; border: none;
  background: #e5f0ff; color: #007aff; font-size: 12px; font-weight: bold;
}
.filter-btn.active { background: #007aff !important; color: #ffffff !important; }
.sort-area { display:flex; gap:5px; margin-bottom:10px; overflow-x:auto; }
.sort-btn { white-space:nowrap; font-size:11px; padding:6px 12px; border-radius:15px; border:1px solid #ccc; background:#eee; }
.sort-btn.active { background:#555; color:#fff; }

/* 詳細画面 */
#detail {
  position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 75px);
  background: #f2f2f7; overflow-y: auto; z-index: 50; transition: transform 0.3s ease-out; box-sizing: border-box;
}

/* 既存スタイル */
.groupTitle { background:#e5e5ea; padding:10px; margin-top:10px; font-weight:bold; border-radius:8px; }
.detail-img { width:100%; max-width:300px; display:block; margin:10px auto; border-radius:12px; }
.groupBox { background:#fff; padding:10px; margin:6px 0; border-radius:10px; }
.row { display:flex; gap:8px; margin-top:4px; align-items: center; }
.hidden { display:none !important; }
#toast {
 position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
 background:rgba(0,0,0,0.8); color:#fff; padding:12px 20px; border-radius:20px;
 font-size:14px; opacity:0; transition:0.3s; pointer-events:none; z-index:300;
}
#toast.show { opacity:1; }
.linkBtn { display:block; text-align:center; margin:10px 0; padding:12px; border-radius:10px; background:#e5f0ff; color:#007aff; text-decoration:none; }
</style>
</head>

<body>

<div class="container">
  <div id="version" style="font-size:12px; color:#aaa; text-align:right; margin-bottom:5px;">v2.10</div>
  
  <div id="listBar" class="topbar">
    <input id="search" placeholder="材料・タイトル検索" oninput="renderList()" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd; font-size: 16px;">
    <button onclick="exportData()">保存</button>
  </div>

  <div id="filterArea">
    <div class="filter-bar">
      <button id="btnAll" class="filter-btn active" onclick="setFilter('all')">すべて</button>
      <button id="btnFav" class="filter-btn" onclick="setFilter('fav')">お気に入り★</button>
    </div>
  </div>

  <div id="list"></div>
  <div id="detail" class="hidden"></div>

  <div id="add" class="hidden">
    <div class="topbar"><h3>レシピ登録</h3><button onclick="saveRecipe()">保存</button></div>
    <input id="title" placeholder="タイトル" style="width:100%; padding:12px; margin-top:5px; box-sizing: border-box; border-radius: 10px; border:1px solid #ddd;">
    <input id="group" placeholder="主菜など" style="width:100%; padding:12px; box-sizing: border-box; border-radius: 10px; border:1px solid #ddd; margin-top:5px;">
    <h4>材料</h4>
    <div id="ingredientsArea"></div>
    <button onclick="addGroup()">材料グループ追加</button>
    <h4>作り方</h4>
    <div id="stepsArea"></div>
    <button onclick="addStep()">工程追加</button>
  </div>

  <div id="stock" class="hidden">
    <div class="topbar"><h3>在庫メモ</h3></div>
    <textarea id="stockMemo" oninput="saveStock()" placeholder="家にあるものをメモ..." style="width:100%; height:60vh; padding:15px; border-radius:12px; border:1px solid #ccc; font-size:16px; box-sizing:border-box;"></textarea>
  </div>

  <div id="shopping" class="hidden">
    <div class="topbar"><h3>買い物リスト</h3><button onclick="clearShopping()" class="btn-red">クリア</button></div>
    <button onclick="alert('【在庫メモ】\n' + (localStorage.getItem('stockMemo') || 'メモは空です'))" style="width:100%; margin-bottom:10px; background:#f0f0f0; color:#333; font-size:13px; min-height:30px;">家にあるものを確認</button>
    <div class="row"><input id="manualItem" placeholder="材料" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd;"><button onclick="addManual()">追加</button></div>
    <ul id="shopList" style="padding:0;"></ul>
  </div>
</div>

<div class="tabbar">
  <button onclick="show('list')">一覧</button>
  <button onclick="show('add')">登録</button>
  <button onclick="show('stock')">在庫</button>
  <button onclick="show('shopping')">買い物</button>
</div>
<div id="toast"></div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");
let editIndex = null, formImage = null, openGroups = {}, currentFilter = 'all';
let touchStartX = 0, currentX = 0;

function show(p){
  const views = ["list", "detail", "add", "shopping", "stock", "filterArea", "listBar"];
  views.forEach(v => {
    let el = document.getElementById(v);
    if(el) { el.classList.add("hidden"); if(v === "detail") el.style.display = "none"; }
  });
  let target = document.getElementById(p);
  if(target) { target.classList.remove("hidden"); if(p === "detail") target.style.display = "block"; }
  if(p==="list") { document.getElementById("filterArea").classList.remove("hidden"); document.getElementById("listBar").classList.remove("hidden"); renderList(); }
  if(p==="stock") document.getElementById("stockMemo").value = localStorage.getItem("stockMemo") || "";
  if(p==="shopping") renderShopping();
  window.scrollTo(0,0);
}

function renderList(){
  const listDiv = document.getElementById("list");
  listDiv.innerHTML = "";
  let key = toKatakana(document.getElementById("search").value.toLowerCase());
  let groups = {};
  recipes.forEach((r, i) => {
    let hit = toKatakana(r.title.toLowerCase()).includes(key) || r.ingredients.some(g => g.items.some(it => toKatakana(it.name.toLowerCase()).includes(key)));
    if(currentFilter === 'fav' && !r.favorite) hit = false;
    if(!hit) return;
    let g = (r.group || "").trim() || "未分類";
    if(!groups[g]) groups[g] = [];
    groups[g].push({r, i});
  });
  Object.keys(groups).sort().forEach(gName => {
    let box = document.createElement("div");
    box.innerHTML = `<div class="groupTitle">${gName}</div>`;
    let wrap = document.createElement("div"); wrap.className = "grid";
    groups[gName].forEach(obj => {
      let div = document.createElement("div"); div.className = "card";
      div.innerHTML = `<img src="${obj.r.image || ''}"><div class="card-info"><div class="card-title">${obj.r.title}</div></div>`;
      div.onclick = () => detailView(obj.i);
      wrap.appendChild(div);
    });
    box.appendChild(wrap); listDiv.appendChild(box);
  });
}

function detailView(i) {
  let r = recipes[i];
  const detailDiv = document.getElementById("detail");
  detailDiv.style.transform = "translateX(0)";
  detailDiv.style.transition = "none";
  show('detail'); 
  
  let html = `<div style="padding: 0 10px 120px;"><button onclick="show('list')">← 戻る</button><h2>${r.title}</h2>`;
  r.ingredients.forEach(g => {
    html += `<h3>${g.name}</h3>`;
    g.items.forEach(it => {
      html += `<label style="display:block; padding:10px 0; border-bottom:1px solid #eee;"><input type="checkbox" data-name="${it.name}" data-amount="${it.amount}"> ${it.name} (${it.amount})</label>`;
    });
  });
  html += `<h3>作り方</h3>`;
  r.steps.forEach(s => html += `<p>${s}</p>`);
  html += `<button style="width:100%;" onclick="addShopping()">買い物に追加</button><button class="btn-red" style="width:100%; margin-top:10px;" onclick="deleteRecipe(${i})">削除</button></div>`;
  detailDiv.innerHTML = html;

  detailDiv.ontouchstart = (e) => { if (e.touches[0].clientX > 60) return; touchStartX = e.touches[0].clientX; detailDiv.style.transition = "none"; };
  detailDiv.ontouchmove = (e) => {
    if (touchStartX === 0) return;
    currentX = (e.touches[0].clientX - touchStartX) * 1.4;
    if (currentX > 0) detailDiv.style.transform = `translateX(${currentX}px)`;
  };
  detailDiv.ontouchend = () => {
    if (touchStartX === 0) return;
    detailDiv.style.transition = "transform 0.2s ease-out";
    if (currentX > 80) { detailDiv.style.transform = "translateX(100%)"; setTimeout(() => show('list'), 200); }
    else { detailDiv.style.transform = "translateX(0)"; }
    touchStartX = 0; currentX = 0;
  };
}

function saveStock() { localStorage.setItem("stockMemo", document.getElementById("stockMemo").value); }
function addManual(){
  let n = document.getElementById("manualItem"); if(!n.value) return;
  shopping.push({name: n.value, checked: false}); n.value = "";
  localStorage.setItem("shopping", JSON.stringify(shopping)); renderShopping();
}
function renderShopping(){
  let list = document.getElementById("shopList"); list.innerHTML = "";
  shopping.forEach((s, i) => {
    let li = document.createElement("li"); li.className = "row"; li.style.background="#fff"; li.style.padding="10px"; li.style.borderRadius="10px";
    li.innerHTML = `<input type="checkbox" ${s.checked?'checked':''} onchange="shopping[${i}].checked=!shopping[${i}].checked; localStorage.setItem('shopping', JSON.stringify(shopping)); renderShopping();"><span style="flex:1;">${s.name}</span><button class="delBtn" onclick="shopping.splice(${i},1); localStorage.setItem('shopping', JSON.stringify(shopping)); renderShopping();">×</button>`;
    list.appendChild(li);
  });
}
function clearShopping(){ if(confirm("クリア？")){ shopping=[]; localStorage.setItem("shopping","[]"); renderShopping(); } }
function toKatakana(str){ return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60)); }
function exportData(){ let blob = new Blob([localStorage.getItem("recipes")], {type:"application/json"}); let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "recipes.json"; a.click(); }
function setFilter(m){ currentFilter=m; renderList(); document.getElementById("btnAll").classList.toggle("active", m==='all'); document.getElementById("btnFav").classList.toggle("active", m==='fav');}

/* 登録用ヘルパー */
function addGroup(){
  let div = document.createElement("div"); div.className = "groupBox";
  div.innerHTML = `<div class="row"><input placeholder="グループ名" style="flex:1;"><button class="delBtn" onclick="this.closest('.groupBox').remove()">×</button></div><div class="items"></div><button onclick="addItem(this.previousElementSibling)" style="margin-top:5px; height:35px; font-size:12px;">+ 追加</button>`;
  document.getElementById("ingredientsArea").appendChild(div); addItem(div.querySelector(".items"));
}
function addItem(c){
  let r = document.createElement("div"); r.className = "row";
  r.innerHTML = `<input placeholder="材料" style="flex:1;"><input placeholder="分量" style="width:70px;"><button class="delBtn" onclick="this.parentNode.remove()">×</button>`;
  c.appendChild(r);
}
function addStep(){
  let d = document.createElement("div"); d.className = "row";
  d.innerHTML = `<textarea style="flex:1; height:60px;"></textarea><button class="delBtn" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById("stepsArea").appendChild(d);
}

show('list');
</script>
</body>
</html>
