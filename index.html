<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Recipe Pro Zenith</title>
<style>
:root {
    --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --text-sub: #8e8e93;
    --safe-bottom: env(safe-area-inset-bottom);
}
@media (prefers-color-scheme: dark) {
    :root { --primary: #0a84ff; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --text-sub: #8e8e93; }
}
body { margin:0; font-family:-apple-system, sans-serif; background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; }
.container { padding: 16px 16px calc(120px + var(--safe-bottom)); max-width:600px; margin:0 auto; }

/* 一覧：グループ表示 */
.section-head { font-size: 13px; font-weight: bold; color: var(--text-sub); margin: 20px 0 10px 5px; text-transform: uppercase; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: var(--card); border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #eee; display: block; }
.card-title { padding: 12px; font-size: 14px; font-weight: 700; line-height: 1.4; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* お気に入りボタン */
.fav-btn { position: absolute; top: 0; right: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; z-index: 10; background: linear-gradient(45deg, transparent 40%, rgba(0,0,0,0.3) 100%); }
.fav-btn::after { content: '★'; font-size: 24px; color: #fff; filter: drop-shadow(0 0 3px rgba(0,0,0,0.5)); }
.fav-btn.active::after { color: #ffcc00; }

/* 下タブ */
.tabbar { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(var(--card), 0.85); backdrop-filter: blur(25px); border-top: 0.5px solid rgba(0,0,0,0.1); padding-bottom: calc(10px + var(--safe-bottom)); z-index: 1000; }
.tab-item { flex: 1; padding: 12px 0; text-align: center; background: none; border: none; color: var(--text-sub); font-size: 10px; font-weight: bold; }
.tab-item span { display: block; font-size: 24px; margin-bottom: 4px; }
.tab-item.active { color: var(--primary); }

/* 入力・編集 */
.ing-group-box { background: rgba(0,0,0,0.03); padding: 12px; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
input, textarea { width:100%; padding:14px; border-radius:12px; border:1px solid rgba(0,0,0,0.1); background:var(--card); color:var(--text); box-sizing:border-box; font-size:16px; margin-bottom:10px; }
.main-btn { width:100%; padding:18px; background:var(--primary); color:#fff; border:none; border-radius:18px; font-size:16px; font-weight:bold; }
.btn-sub { background:none; border:none; color:var(--primary); padding:10px; font-size:14px; cursor:pointer; }
.hidden { display:none; }

/* 買い物リスト */
.shop-item { display: flex; align-items: center; background: var(--card); padding: 16px; border-radius: 14px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.shop-item.checked { opacity: 0.5; text-decoration: line-through; }
</style>
</head>
<body>

<div class="container">
    <div id="p-list">
        <input type="search" id="q" placeholder="レシピを検索..." oninput="render()">
        <div id="list-content"></div>
    </div>

    <div id="p-detail" class="hidden"></div>

    <div id="p-shop" class="hidden">
        <h1>買い物リスト</h1>
        <div id="shop-list"></div>
        <button class="btn-sub" onclick="clearShop()" style="color:red; width:100%;">完了済みを削除</button>
    </div>

    <div id="p-edit" class="hidden">
        <h2 id="edit-title">レシピ登録</h2>
        <img id="img-prev" style="width:100%; border-radius:16px; margin-bottom:15px; display:none; aspect-ratio:4/3; object-fit:cover;">
        <input type="file" id="f-file" accept="image/*">
        <input id="f-name" placeholder="料理名">
        <div id="f-ings"></div>
        <button class="btn-sub" onclick="addIngGroup()">+ 材料グループを追加</button>
        <div id="f-steps"></div>
        <button class="btn-sub" onclick="addStepField()">+ 手順を追加</button>
        <button class="main-btn" onclick="save()">レシピを保存</button>
        <button class="btn-sub" style="width:100%; color:var(--text-sub);" onclick="nav('list')">キャンセル</button>
    </div>

    <div id="p-bak" class="hidden">
        <h1>データ管理</h1>
        <button class="main-btn" style="margin-bottom:20px;" onclick="exportData()">データを保存（書き出し）</button>
        <div style="background:var(--card); padding:20px; border-radius:16px;">
            <p style="font-size:14px; margin-top:0;">データを読み込む（復元）</p>
            <input type="file" id="import-file" accept=".json" onchange="importData(this)">
        </div>
    </div>
</div>

<nav class="tabbar">
    <button class="tab-item active" onclick="nav('list')"><span>📖</span>一覧</button>
    <button class="tab-item" onclick="nav('shop')"><span>🛒</span>買い物</button>
    <button class="tab-item" onclick="initAdd()"><span>➕</span>登録</button>
    <button class="tab-item" onclick="nav('bak')"><span>⚙️</span>設定</button>
</nav>

<script>
let recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
let shopList = JSON.parse(localStorage.getItem('shopList') || '[]');
let currentIdx = null; let currentImg = null;

function nav(p) {
    document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
    document.getElementById('p-' + p).classList.remove('hidden');
    document.querySelectorAll('.tab-item').forEach((t, i) => t.classList.toggle('active', ['list','shop','edit','bak'][i] === p));
    if(p === 'list') render();
    if(p === 'shop') renderShop();
    window.scrollTo(0,0);
}

function render() {
    const cont = document.getElementById('list-content'); cont.innerHTML = "";
    const q = document.getElementById('q').value.toLowerCase();
    const favs = recipes.filter(r => r.fav && (!q || r.title.toLowerCase().includes(q)));
    const others = recipes.filter(r => !r.fav && (!q || r.title.toLowerCase().includes(q)));

    if(favs.length > 0) {
        cont.innerHTML += `<div class="section-head">お気に入り</div><div class="grid" id="grid-fav"></div>`;
        renderGrid(favs, 'grid-fav');
    }
    cont.innerHTML += `<div class="section-head">すべてのレシピ</div><div class="grid" id="grid-all"></div>`;
    renderGrid(others, 'grid-all');
}

function renderGrid(data, targetId) {
    const grid = document.getElementById(targetId);
    data.forEach(r => {
        const i = recipes.indexOf(r);
        const div = document.createElement('div'); div.className = "card";
        div.innerHTML = `<div class="fav-btn ${r.fav?'active':''}" onclick="event.stopPropagation(); toggleFav(${i});"></div>
                         <img src="${r.img||''}"> <div class="card-title">${r.title}</div>`;
        div.onclick = () => showDetail(i);
        grid.appendChild(div);
    });
}

function showDetail(i) {
    currentIdx = i; const r = recipes[i]; const d = document.getElementById('p-detail'); nav('detail');
    let ingsHtml = r.ings.map(g => `
        <div style="font-weight:bold; margin-top:20px; display:flex; justify-content:space-between;">
            <span>${g.name}</span>
            <button class="btn-sub" style="padding:0;" onclick="addAllToShop(${i}, '${g.name}')">🛒 全て追加</button>
        </div>
        ${g.items.map(it => `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(0,0,0,0.05);"><span>${it.name}</span><span>${it.amount}</span></div>`).join('')}
    `).join('');

    d.innerHTML = `
        <img src="${r.img||''}" style="width:100%; border-radius:20px; margin-bottom:20px; aspect-ratio:4/3; object-fit:cover;">
        <h1>${r.title}</h1>
        ${ingsHtml}
        <div style="font-weight:bold; margin-top:20px;">作り方</div>
        ${r.steps.map((s, idx) => `<div style="display:flex; gap:12px; margin:15px 0;"><span style="background:var(--primary); color:#fff; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">${idx+1}</span><p style="margin:0;">${s}</p></div>`).join('')}
        <button class="main-btn" style="margin-top:30px;" onclick="edit(${i})">編集する</button>
        <button class="btn-sub" style="width:100%; color:red;" onclick="removeRecipe(${i})">レシピを削除</button>
        <button class="btn-sub" style="width:100%;" onclick="nav('list')">一覧に戻る</button>
    `;
}

// 画像リサイズ
document.getElementById('f-file').onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas'); const max = 500;
            const scale = max / Math.max(img.width, img.height);
            canvas.width = img.width * scale; canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img, 0,0,canvas.width,canvas.height);
            currentImg = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('img-prev').src = currentImg; document.getElementById('img-prev').style.display = "block";
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

// 編集・登録
function initAdd() { currentIdx = null; currentImg = null; document.getElementById('f-name').value = ""; document.getElementById('f-ings').innerHTML = ""; document.getElementById('f-steps').innerHTML = ""; document.getElementById('img-prev').style.display = "none"; addIngGroup(); addStepField(); nav('edit'); }

function addIngGroup(name = "", items = []) {
    const div = document.createElement('div'); div.className = "ing-group-box";
    div.innerHTML = `
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input class="g-name" placeholder="グループ名" value="${name}" style="margin:0; flex:1">
            <button class="btn-sub" onclick="this.parentElement.parentElement.remove()" style="color:red;">削除</button>
        </div>
        <div class="g-items-form"></div>
        <button class="btn-sub" onclick="addIngField(this.previousSibling)">+ 材料追加</button>`;
    document.getElementById('f-ings').appendChild(div);
    if(items.length > 0) items.forEach(it => addIngField(div.querySelector('.g-items-form'), it.name, it.amount));
    else addIngField(div.querySelector('.g-items-form'));
}

function addIngField(target, n="", a="") {
    const div = document.createElement('div'); div.style.display="flex"; div.style.gap="8px";
    div.innerHTML = `<input class="i-name" placeholder="材料" value="${n}" style="flex:2"><input class="i-amt" placeholder="分量" value="${a}" style="flex:1"><button onclick="this.parentElement.remove()" style="border:none; background:none;">×</button>`;
    target.appendChild(div);
}

function addStepField(v="") {
    const div = document.createElement('div'); div.style.display="flex"; div.style.gap="8px";
    div.innerHTML = `<textarea class="s-text" placeholder="作り方を入力">${v}</textarea><button onclick="this.parentElement.remove()" style="border:none; background:none;">×</button>`;
    document.getElementById('f-steps').appendChild(div);
}

function save() {
    const r = {
        title: document.getElementById('f-name').value || "無題のレシピ",
        img: currentImg,
        ings: Array.from(document.querySelectorAll('.ing-group-box')).map(box => ({
            name: box.querySelector('.g-name').value || "材料",
            items: Array.from(box.querySelectorAll('.i-name')).map((n, idx) => ({ name: n.value, amount: box.querySelectorAll('.i-amt')[idx].value })).filter(it => it.name)
        })),
        steps: Array.from(document.querySelectorAll('.s-text')).map(s => s.value).filter(s => s),
        fav: currentIdx !== null ? recipes[currentIdx].fav : false
    };
    if(currentIdx !== null) recipes[currentIdx] = r; else recipes.push(r);
    saveAll(); nav('list');
}

function edit(i) {
    currentIdx = i; const r = recipes[i]; currentImg = r.img; nav('edit');
    document.getElementById('f-name').value = r.title;
    document.getElementById('f-ings').innerHTML = "";
    r.ings.forEach(g => addIngGroup(g.name, g.items));
    document.getElementById('f-steps').innerHTML = "";
    r.steps.forEach(s => addStepField(s));
    if(r.img){ document.getElementById('img-prev').src=r.img; document.getElementById('img-prev').style.display="block"; }
}

// 買い物リスト
function addAllToShop(idx, groupName) {
    const g = recipes[idx].ings.find(g => g.name === groupName);
    g.items.forEach(it => shopList.push({ name: it.name, amt: it.amount, checked: false }));
    localStorage.setItem('shopList', JSON.stringify(shopList));
    alert("リストに追加しました");
}
function renderShop() {
    const list = document.getElementById('shop-list'); list.innerHTML = "";
    shopList.forEach((it, i) => {
        const div = document.createElement('div'); div.className = `shop-item ${it.checked?'checked':''}`;
        div.innerHTML = `<input type="checkbox" ${it.checked?'checked':''} onchange="toggleShop(${i})"> <span style="flex:1; margin-left:10px;">${it.name} (${it.amt})</span>`;
        list.appendChild(div);
    });
}
function toggleShop(i) { shopList[i].checked = !shopList[i].checked; localStorage.setItem('shopList', JSON.stringify(shopList)); renderShop(); }
function clearShop() { shopList = shopList.filter(it => !it.checked); localStorage.setItem('shopList', JSON.stringify(shopList)); renderShop(); }

// 共通
function saveAll() { localStorage.setItem('recipes', JSON.stringify(recipes)); }
function toggleFav(i) { recipes[i].fav = !recipes[i].fav; saveAll(); render(); }
function removeRecipe(i) { if(confirm('削除しますか？')) { recipes.splice(i, 1); saveAll(); nav('list'); } }

// バックアップ
function exportData() {
    const blob = new Blob([JSON.stringify(recipes)], {type: "application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `recipe_backup.json`; a.click();
}
function importData(input) {
    const reader = new FileReader();
    reader.onload = () => { recipes = JSON.parse(reader.result); saveAll(); nav('list'); alert("復元しました"); };
    reader.readAsText(input.files[0]);
}

nav('list');
</script>
</body>
</html>
