<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:10px 10px 110px; }

/* タブ */
.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
}
.tabbar button {
 flex:1;
 padding:25px;
 font-size:18px;
}

/* 一覧 */
.grid {
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:6px;
}
.card {
 background:#fff;
 border-radius:8px;
 overflow:hidden;
 font-size:11px;
}
.card img {
 width:100%;
 height:80px;
 object-fit:cover;
}

/* 登録 */
#add input, #add textarea {
 font-size:16px;
 padding:10px;
 margin:6px 0;
 width:100%;
 box-sizing:border-box;
}

.row {
 display:flex;
 gap:5px;
}
.row input:nth-child(1){ flex:2; }
.row input:nth-child(2){ flex:1; }

/* 削除ボタン極小 */
.delBtn {
 width:24px;
 padding:0;
 font-size:16px;
}

.groupBox, .stepBox {
 display:flex;
 align-items:center;
 gap:5px;
}
.groupBox input, .stepBox textarea {
 flex:1;
}

/* 工程番号 */
.stepNumber {
 width:25px;
 text-align:right;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div id="add">

<h3>レシピ登録</h3>

<input id="title" placeholder="タイトル">
<input type="file" id="imageFile">
<input id="group" placeholder="主菜など">

<h4>材料</h4>
<div id="ingredientsArea"></div>
<button onclick="addGroup()">材料グループ追加</button>

<h4>作り方</h4>
<div id="stepsArea"></div>
<button onclick="addStep()">工程追加</button>

</div>

</div>

<script>

/* 材料グループ */
function addGroup(){
 let div=document.createElement("div");
 div.className="groupBox";

 div.innerHTML=`
 <input placeholder="グループ名">
 <button class="delBtn" onclick="this.parentNode.remove()">×</button>
 `;

 let items=document.createElement("div");
 div.appendChild(items);

 let addBtn=document.createElement("button");
 addBtn.textContent="＋";
 addBtn.onclick=()=>addItem(items);

 div.appendChild(addBtn);

 ingredientsArea.appendChild(div);

 /* ★追加直後に1行作る（重要：これで入力欄復活） */
 addItem(items);
}

/* 材料 */
function addItem(container){
 let row=document.createElement("div");
 row.className="row";

 row.innerHTML=`
 <input placeholder="材料">
 <input placeholder="分量">
 <button class="delBtn" onclick="this.parentNode.remove()">×</button>
 `;

 container.appendChild(row);
}

/* 工程 */
function addStep(){
 let div=document.createElement("div");
 div.className="stepBox";

 let num=document.createElement("div");
 num.className="stepNumber";

 let textarea=document.createElement("textarea");

 let del=document.createElement("button");
 del.className="delBtn";
 del.textContent="×";
 del.onclick=()=>{
  div.remove();
  updateStepNumbers();
 };

 div.appendChild(num);
 div.appendChild(textarea);
 div.appendChild(del);

 stepsArea.appendChild(div);

 updateStepNumbers();
}

/* 番号振り直し */
function updateStepNumbers(){
 document.querySelectorAll(".stepBox").forEach((s,i)=>{
  s.querySelector(".stepNumber").textContent=(i+1)+".";
 });
}

</script>

</body>
</html>
