<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:10px 10px 110px; }

/* ===== 下タブ ===== */
.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
}
.tabbar button {
 flex:1;
 padding:25px;
 font-size:18px;
}

/* ===== 登録画面 ===== */
#add input, #add textarea {
 font-size:16px;
 padding:10px;
 margin:6px 0;
 width:100%;
 box-sizing:border-box;
}

#add button {
 font-size:18px;
 padding:10px;
 margin:6px 0;
 width:100%;
}

/* 材料グループ（縦配置） */
.groupBox {
 background:#fff;
 padding:8px;
 margin:8px 0;
 border-radius:8px;
}

.items {
 margin-top:5px;
}

/* 材料行 */
.row {
 display:flex;
 gap:5px;
 margin-top:5px;
}
.row input:nth-child(1){ flex:2; }
.row input:nth-child(2){ flex:1; }

/* 削除ボタン */
.delBtn {
 width:24px;
 font-size:16px;
 padding:0;
}

/* 工程 */
.stepBox {
 display:flex;
 align-items:center;
 gap:5px;
 margin:5px 0;
}

.stepNumber {
 width:25px;
 text-align:right;
}

.stepBox textarea {
 flex:1;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<!-- 登録画面 -->
<div id="add">

<h3>レシピ登録</h3>

<input id="title" placeholder="タイトル">
<input type="file" id="imageFile">
<input id="group" placeholder="主菜など">

<h4>材料</h4>
<div id="ingredientsArea"></div>
<button onclick="addGroup()">材料グループ追加</button>

<h4>作り方</h4>
<div id="stepsArea"></div>
<button onclick="addStep()">工程追加</button>

<button onclick="saveRecipe()">保存</button>
<button onclick="clearForm()">クリア</button>

</div>

</div>

<!-- 下タブ -->
<div class="tabbar">
<button onclick="alert('一覧は別で実装')">一覧</button>
<button>登録</button>
<button onclick="alert('買い物は別で実装')">買い物</button>
</div>

<script>

/* 材料グループ */
function addGroup(){
 let div=document.createElement("div");
 div.className="groupBox";

 div.innerHTML=`
 <input placeholder="グループ名">
 <button class="delBtn" onclick="this.parentNode.remove()">×</button>
 <div class="items"></div>
 <button onclick="addItem(this)">材料追加</button>
 `;

 ingredientsArea.appendChild(div);

 /* 初期1行 */
 addItem(div.querySelector(".items"));
}

/* 材料 */
function addItem(btn){
 let container = btn.classList.contains("items") ? btn : btn.previousElementSibling;

 let row=document.createElement("div");
 row.className="row";

 row.innerHTML=`
 <input placeholder="材料">
 <input placeholder="分量">
 <button class="delBtn" onclick="this.parentNode.remove()">×</button>
 `;

 container.appendChild(row);
}

/* 工程 */
function addStep(){
 let div=document.createElement("div");
 div.className="stepBox";

 div.innerHTML=`
 <div class="stepNumber"></div>
 <textarea></textarea>
 <button class="delBtn" onclick="removeStep(this)">×</button>
 `;

 stepsArea.appendChild(div);
 updateStepNumbers();
}

function removeStep(btn){
 btn.parentNode.remove();
 updateStepNumbers();
}

function updateStepNumbers(){
 document.querySelectorAll(".stepBox").forEach((s,i)=>{
  s.querySelector(".stepNumber").textContent=(i+1)+".";
 });
}

/* ダミー */
function saveRecipe(){ alert("保存（ここは既存コードに戻せる）"); }
function clearForm(){
 title.value="";
 group.value="";
 imageFile.value="";
 ingredientsArea.innerHTML="";
 stepsArea.innerHTML="";
}

</script>

</body>
</html>
