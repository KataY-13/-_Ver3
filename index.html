<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>検証用：詳細画面なし</title>

<style>
/* v1.14のスタイルをそのまま継承 */
body { margin:0; font-family:sans-serif; background:#f2f2f7; overflow: hidden; height: 100vh; }
.container { height: 100%; display: flex; flex-direction: column; }

.main-viewport { flex: 1; overflow: hidden; position: relative; }
.main-wrapper { display: flex; width: 400%; height: 100%; transition: transform 0.3s ease-out; }
.page { width: 25%; height: 100%; overflow-y: auto; padding: 10px 10px 110px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }

/* 検証：detailのスタイルは残しますが、HTMLからは消します */
#detail { display: none !important; }

.tabbar { position:fixed; bottom:0; width:100%; display:flex; background:#fff; border-top:1px solid #ccc; z-index: 2000; height: 90px; }
.tabbar button { flex:1; padding:0; font-size:18px; background: none; border: none; color: #999; }
.tabbar button.active { color: #007aff; font-weight: bold; }

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.card { background:#fff; border-radius:12px; overflow:hidden; font-size:11px; position: relative; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.card img { width:100%; height:80px; object-fit:cover; }
.card div { text-align:center; }
.groupTitle { background:#e5e5ea; padding:10px; margin-top:10px; font-weight:bold; border-radius:8px; }
#add input, #add textarea { font-size:16px; padding:12px; min-height:22px; width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:10px; }
.row { display:flex; gap:5px; margin-top:5px; }
.row input:nth-child(1){ flex:4; }
.row input:nth-child(2){ flex:3; }
.delBtn { width:1.2em; min-width:28px; height:44px; font-size:14px; background:#ff3b30; color:#fff; border:none; border-radius:10px; }
.groupBox { background:#fff; padding:8px; margin:8px 0; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.stepBox { display:flex; gap:5px; align-items:center; margin:5px 0; }
.stepNumber { width:25px; text-align:right; }
.stepBox textarea { flex:1; min-height:80px; }
li { list-style:none; background:#fff; margin:6px 0; padding:10px; border-radius:12px; display:flex; align-items:center; gap:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.gray { color:#aaa; text-decoration:line-through; }
.topbar { display:flex; justify-content:space-between; gap:8px; align-items:center; }
button:not(.tabbar button) { min-height:44px; font-size:16px; padding:10px 12px; border:none; border-radius:10px; background:#e5f0ff; color:#007aff; }
button:active { opacity:0.7; }
input[type="checkbox"] { transform:scale(1.3); }
#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:12px 20px; border-radius:20px; font-size:14px; opacity:0; transition:opacity 0.3s, bottom 0.3s; pointer-events:none; z-index: 3000; }
#toast.show { opacity:1; bottom:100px; }
.fav-star { position: absolute; top: 5px; right: 5px; font-size: 24px; color: #ccc; text-shadow: 0 0 3px #fff; z-index: 10; }
.fav-star.active { color: #ffcc00; }
.filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
.filter-btn { flex: 1; max-width: 150px; }
.filter-btn.active { background: #007aff !important; color: #fff !important; }
</style>
</head>

<body>

<div class="container">
  <div class="main-viewport" id="viewport">
    <div class="main-wrapper" id="mainWrapper">
      <div class="page" id="page-list">
        <div id="version" style="font-size:12px; color:#aaa; text-align:right; margin-bottom:4px;">v1.15 (Test)</div>
        <div class="topbar">
          <input id="search" placeholder="検索" oninput="renderList()" style="flex:1;">
          <button onclick="exportData()">バックアップ</button>
        </div>
        <div class="filter-bar" style="margin-top:10px;">
          <button id="btnAll" class="filter-btn active" onclick="setFilter('all')">すべて</button>
          <button id="btnFav" class="filter-btn" onclick="setFilter('fav')">お気に入り★</button>
        </div>
        <div id="list"></div>
      </div>

      <div class="page" id="page-add">
        <div class="topbar"><h3>レシピ登録</h3><button onclick="alert('登録ボタン反応OK')">テスト</button></div>
        <input id="title" placeholder="タイトル" style="margin-top:8px;">
        <div id="ingredientsArea"></div><button onclick="addGroup()">材料グループ追加</button>
      </div>

      <div class="page" id="page-shopping">
        <div class="topbar"><h3>買い物リスト</h3><button onclick="alert('買い物クリア反応OK')">クリア</button></div>
        <div class="row"><input id="manualItem" placeholder="材料"><input id="manualAmount" placeholder="分量"></div>
        <button onclick="addManual()" style="width:100%; margin-top:8px;">追加ボタンのテスト</button>
        <ul id="shopList" style="padding:0;"></ul>
      </div>

      <div class="page" id="page-stock">
        <div class="topbar"><h3>在庫リスト</h3></div>
        <button onclick="alert('在庫ボタン反応OK')">追加テスト</button>
        <ul id="stockList" style="margin-top:10px; padding:0;"></ul>
      </div>
    </div>
  </div>

  </div>

<div class="tabbar">
  <button id="tab0" onclick="show(0)">一覧</button>
  <button id="tab1" onclick="show(1)">登録</button>
  <button id="tab2" onclick="show(2)">買い物</button>
  <button id="tab3" onclick="show(3)">在庫</button>
</div>
<div id="toast"></div>

<script>
/* スワイプ・スライドロジック（v1.14そのまま） */
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");
let stock = JSON.parse(localStorage.getItem("stockItems")||"[]");
let openGroups={}, currentFilter = 'all', currentPage = 0;

const wrapper = document.getElementById('mainWrapper');
let startX = 0, startY = 0, moveX = 0, isScrolling = false, isHorizontal = false;

function show(idx) {
  currentPage = idx;
  updateUI();
}

function updateUI() {
  wrapper.style.transform = `translateX(${-currentPage * 25}%)`;
  document.querySelectorAll('.tabbar button').forEach((btn, i) => btn.classList.toggle('active', i === currentPage));
  if(currentPage === 0) renderList();
  if(currentPage === 2) renderShopping();
  if(currentPage === 3) renderStock();
}

wrapper.ontouchstart = e => { 
  startX = e.touches[0].pageX; startY = e.touches[0].pageY; 
  moveX = 0; isScrolling = false; isHorizontal = false; 
  wrapper.style.transition = 'none'; 
};

wrapper.ontouchmove = e => {
  let dx = e.touches[0].pageX - startX;
  let dy = e.touches[0].pageY - startY;
  if (!isScrolling && !isHorizontal) {
    if (Math.abs(dy) > Math.abs(dx)) { isScrolling = true; }
    else if (Math.abs(dx) > 10) { isHorizontal = true; }
  }
  if (isHorizontal) {
    e.preventDefault();
    moveX = dx;
    let offset = -currentPage * (window.innerWidth) + (moveX * 1.1);
    wrapper.style.transform = `translateX(${offset}px)`;
  }
};

wrapper.ontouchend = () => {
  wrapper.style.transition = 'transform 0.3s ease-out';
  if (isHorizontal && Math.abs(moveX) > 50) {
    if (moveX > 0 && currentPage > 0) currentPage--;
    else if (moveX < 0 && currentPage < 3) currentPage++;
  }
  updateUI();
};

/* 既存ロジック（最小限） */
function renderList(){
  const list = document.getElementById("list"); list.innerHTML="";
  recipes.forEach((r,i)=>{
    let div=document.createElement("div"); div.className="card";
    div.innerHTML = `<img src="${r.image||''}"><div>${r.title}</div>`;
    div.onclick=()=>alert("カードがクリックされました");
    list.appendChild(div);
  });
}
function renderShopping(){
  const shopList = document.getElementById("shopList"); shopList.innerHTML="";
  shopping.forEach((s,i)=>{
    let li=document.createElement("li");
    li.innerHTML=`${s.name} (${s.amount}) <button onclick="alert('削除反応OK')">×</button>`;
    shopList.appendChild(li);
  });
}
function addManual(){ alert("追加ボタンが反応しました！"); }
function addGroup(){ alert("材料グループ追加が反応しました！"); }
function setFilter(m){ currentFilter=m; renderList(); }
function toKatakana(str){ return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60)); }
function showToast(msg){ let t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>{ t.classList.remove("show"); },1500); }

show(0);
</script>
</body>
</html>
