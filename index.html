<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Recipe App Pro v8.0</title>
<style>
:root {
    --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --text-sub: #8e8e93;
    --safe-area-bottom: env(safe-area-inset-bottom);
}
@media (prefers-color-scheme: dark) {
    :root { --primary: #0a84ff; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --text-sub: #8e8e93; }
}
body { margin:0; font-family:-apple-system, sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
.container { padding:16px 16px calc(80px + var(--safe-area-bottom)); max-width:600px; margin:0 auto; }

/* お気に入り：視認性MAX */
.fav-btn {
    position: absolute; top: 0; right: 0; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; z-index: 10;
    background: linear-gradient(45deg, transparent 50%, rgba(0,0,0,0.3) 100%);
}
.fav-btn::after { content: '★'; font-size: 24px; color: #fff; filter: drop-shadow(0 0 2px rgba(0,0,0,0.8)); }
.fav-btn.active::after { color: #ffcc00; filter: drop-shadow(0 0 5px rgba(255,204,0,0.8)); }

/* リストアイテム：広いタップ判定と自動ソート用 */
.list-item {
    background: var(--card); padding: 14px; border-radius: 12px; margin-bottom: 8px;
    display: flex; align-items: center; cursor: pointer; transition: 0.2s;
}
.list-item.done { opacity: 0.5; background: #e5e5ea; order: 1; }
.list-item:not(.done) { order: 0; }
.flex-list { display: flex; flex-direction: column; }

/* その他スタイル */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px; }
.card { background:var(--card); border-radius:18px; overflow:hidden; position:relative; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.card img { width:100%; height:110px; object-fit:cover; background:#ccc; }
.chip-container { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.chip { padding: 4px 10px; background: var(--bg); border-radius: 15px; font-size: 11px; color: var(--primary); font-weight: bold; border: 1px solid var(--primary); }
.tabbar { position:fixed; bottom:0; width:100%; display:flex; background:rgba(var(--card), 0.85); backdrop-filter:blur(20px); border-top:1px solid rgba(0,0,0,0.1); padding-bottom:var(--safe-area-bottom); z-index:1000; }
.tab-item { flex:1; padding:12px; text-align:center; background:none; border:none; color:var(--text-sub); font-size:10px; }
.tab-item.active { color:var(--primary); }
.hidden { display:none; }
input[type="text"], input[type="search"], textarea { width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; background:var(--card); color:var(--text); box-sizing:border-box; margin-bottom:10px; font-size:16px; }
</style>
</head>
<body>

<div class="container">
    <div id="p-list">
        <input type="search" id="q" placeholder="レシピを検索..." oninput="render()">
        <div id="list" class="grid"></div>
    </div>

    <div id="p-shop" class="hidden">
        <h2>🛒 買い物リスト</h2>
        <div style="display:flex; gap:8px; margin-bottom:15px;">
            <input id="new-shop" placeholder="買うもの" style="flex:2">
            <button onclick="addShopItem()" style="padding:10px; border-radius:10px; background:var(--primary); color:#fff; border:none;">追加</button>
        </div>
        <div id="shop-items" class="flex-list"></div>
    </div>

    <div id="p-stock" class="hidden">
        <h2>📦 在庫リスト</h2>
        <div style="display:flex; gap:8px; margin-bottom:15px;">
            <input id="new-stock" placeholder="在庫アイテム" style="flex:2">
            <button onclick="addStockItem()" style="padding:10px; border-radius:10px; background:var(--primary); color:#fff; border:none;">追加</button>
        </div>
        <div id="stock-items" class="flex-list"></div>
    </div>

    <div id="p-edit" class="hidden">
        <h2 id="edit-title">レシピ編集</h2>
        <img id="img-prev" style="width:100%; border-radius:12px; margin-bottom:10px; display:none;">
        <input type="file" id="f-file" accept="image/*">
        <input id="f-name" placeholder="料理名">
        <div id="f-ings"></div>
        <button onclick="addIngGroup()">+ グループ追加</button>
        <div id="f-steps"></div>
        <button onclick="addStepField()">+ 工程追加</button>
        <button onclick="save()" style="width:100%; padding:15px; background:var(--primary); color:#fff; border:none; border-radius:12px; margin-top:20px;">保存</button>
    </div>

    <div id="p-detail" class="hidden"></div>
</div>

<nav class="tabbar">
    <button class="tab-item active" onclick="nav('list')">📖 一覧</button>
    <button class="tab-item" onclick="initAdd()">➕ 登録</button>
    <button class="tab-item" onclick="nav('shop')">🛒 買い物</button>
    <button class="tab-item" onclick="nav('stock')">📦 在庫</button>
</nav>

<script>
let recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
let shopItems = JSON.parse(localStorage.getItem('shopItems') || '[]');
let stockItems = JSON.parse(localStorage.getItem('stockItems') || '[]');
let currentIdx = null;
let currentImg = null;

function nav(p) {
    document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
    document.getElementById('p-' + p).classList.remove('hidden');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    if(p === 'list') render();
    if(p === 'shop') renderCheckList('shop');
    if(p === 'stock') renderCheckList('stock');
}

// チェックリスト描画（買い物・在庫共通ロジック）
function renderCheckList(type) {
    const list = type === 'shop' ? shopItems : stockItems;
    const target = document.getElementById(type + '-items');
    target.innerHTML = "";
    
    // 未完了を上に、完了を下にソート
    const sorted = list.map((item, index) => ({...item, originalIndex: index}))
                       .sort((a, b) => a.checked - b.checked);

    sorted.forEach(item => {
        const div = document.createElement('div');
        div.className = `list-item ${item.checked ? 'done' : ''}`;
        div.onclick = () => {
            list[item.originalIndex].checked = !list[item.originalIndex].checked;
            saveAll();
            renderCheckList(type);
        };
        div.innerHTML = `
            <input type="checkbox" ${item.checked ? 'checked' : ''} style="pointer-events:none; margin-right:12px;">
            <span style="flex:1; ${item.checked ? 'text-decoration:line-through' : ''}">${item.name}</span>
            <button onclick="event.stopPropagation(); deleteItem('${type}', ${item.originalIndex})" style="background:none; border:none; color:red;">×</button>
        `;
        target.appendChild(div);
    });
}

function addShopItem() {
    const input = document.getElementById('new-shop');
    if(!input.value) return;
    shopItems.push({name: input.value, checked: false});
    input.value = ""; saveAll(); renderCheckList('shop');
}

function addStockItem() {
    const input = document.getElementById('new-stock');
    if(!input.value) return;
    stockItems.push({name: input.value, checked: false});
    input.value = ""; saveAll(); renderCheckList('stock');
}

function deleteItem(type, index) {
    if(type === 'shop') shopItems.splice(index, 1);
    else stockItems.splice(index, 1);
    saveAll(); renderCheckList(type);
}

function saveAll() {
    localStorage.setItem('recipes', JSON.stringify(recipes));
    localStorage.setItem('shopItems', JSON.stringify(shopItems));
    localStorage.setItem('stockItems', JSON.stringify(stockItems));
}

function render() {
    const grid = document.getElementById('list');
    grid.innerHTML = "";
    recipes.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = "card";
        div.innerHTML = `<div class="fav-btn ${r.fav?'active':''}" onclick="event.stopPropagation(); recipes[${i}].fav=!recipes[${i}].fav; saveAll(); render();"></div>
                         <img src="${r.img || ''}"><div class="card-title">${r.title}</div>`;
        div.onclick = () => showDetail(i);
        grid.appendChild(div);
    });
}

// ページ読み込み時の初期表示
nav('list');
</script>
</body>
</html>
