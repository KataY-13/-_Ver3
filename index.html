<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recipe Fix</title>
    <style>
        :root { --p: #007aff; --bg: #f2f2f7; --c: #fff; --t: #1c1c1e; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--t); padding-bottom: 100px; }
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--c); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #ddd; display: block; }
        .card-name { padding: 10px; font-size: 14px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { padding: 14px; border-radius: 10px; border: none; font-weight: bold; width: 100%; margin-bottom: 8px; cursor: pointer; }
        .btn-p { background: var(--p); color: #fff; }
        .btn-s { background: #e5e5ea; color: var(--t); }
        .tabbar { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--c); border-top: 1px solid #ccc; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 15px; border: none; background: none; font-size: 12px; }
        .g-wrap { background: #eee; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="v-list">
        <input type="search" id="q" placeholder="検索..." oninput="draw()">
        <div id="list-target" class="grid"></div>
    </div>

    <div id="v-shop" class="hidden">
        <h2>買い物</h2>
        <div id="shop-target"></div>
        <button class="btn btn-s" onclick="clrShop()">完了分を削除</button>
    </div>

    <div id="v-edit" class="hidden">
        <input type="file" accept="image/*" onchange="upImg(this)">
        <img id="edit-prev" style="width:100%; display:none; margin-bottom:10px;">
        <input id="edit-title" placeholder="レシピ名">
        <div id="edit-ings"></div>
        <button class="btn btn-s" onclick="addG()">+ グループ追加</button>
        <div id="edit-steps"></div>
        <button class="btn btn-s" onclick="addS()">+ 手順追加</button>
        <button class="btn btn-p" onclick="doSave()">保存</button>
        <button class="btn btn-s" onclick="nav('list')">戻る</button>
    </div>

    <div id="v-detail" class="hidden"></div>
</div>

<nav class="tabbar">
    <button class="tab" onclick="nav('list')">一覧</button>
    <button class="tab" onclick="nav('shop')">買い物</button>
    <button class="tab" onclick="initAdd()">登録</button>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('R_DB') || '[]');
    let cart = JSON.parse(localStorage.getItem('R_CART') || '[]');
    let curI = null, curImg = null;

    function nav(p) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('v-' + p).classList.remove('hidden');
        if(p==='list') draw(); if(p==='shop') drawShop();
    }

    function draw() {
        const t = document.getElementById('list-target'); t.innerHTML = "";
        const q = document.getElementById('q').value.toLowerCase();
        db.forEach((r, i) => {
            if(r.name.toLowerCase().includes(q)) {
                const d = document.createElement('div'); d.className='card';
                d.innerHTML = `<img src="${r.img||''}"> <div class="card-name">${r.name}</div>`;
                d.onclick = () => show(i); t.appendChild(d);
            }
        });
    }

    function show(i) {
        curI = i; const r = db[i]; nav('detail');
        document.getElementById('v-detail').innerHTML = `
            <img src="${r.img||''}" style="width:100%">
            <h1>${r.name}</h1>
            ${r.ings.map(g=>`<h4>${g.n} <button onclick="toC(${i},'${g.n}')">🛒</button></h4>` + g.it.map(it=>`<div>${it.n} ${it.a}</div>`).join('')).join('')}
            ${r.steps.map((s,idx)=>`<p>${idx+1}. ${s}</p>`).join('')}
            <button class="btn btn-p" onclick="initEdit(${i})">編集</button>
            <button class="btn btn-s" onclick="del(${i})" style="color:red">削除</button>
            <button class="btn btn-s" onclick="nav('list')">戻る</button>`;
    }

    function upImg(el) {
        const f = el.files[0]; if(!f) return;
        const r = new FileReader(); r.onload = e => {
            const img = new Image(); img.onload = () => {
                const c = document.createElement('canvas'); const s = 500 / Math.max(img.width, img.height);
                c.width = img.width * s; c.height = img.height * s;
                c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                curImg = c.toDataURL('image/jpeg', 0.7);
                document.getElementById('edit-prev').src = curImg; document.getElementById('edit-prev').style.display = 'block';
            }; img.src = e.target.result;
        }; r.readAsDataURL(f);
    }

    function addG(n="", it=[]) {
        const d = document.createElement('div'); d.className='g-wrap';
        d.innerHTML = `<input class="gn" value="${n}" placeholder="グループ名"><div class="ia"></div><button onclick="addI(this.previousSibling)">+材料</button>`;
        document.getElementById('edit-ings').appendChild(d);
        if(it.length) it.forEach(x => addI(d.querySelector('.ia'), x.n, x.a)); else addI(d.querySelector('.ia'));
    }

    function addI(t, n="", a="") {
        const d = document.createElement('div'); d.innerHTML = `<input class="in" value="${n}" style="width:60%"><input class="ia" value="${a}" style="width:30%"><button onclick="this.parentElement.remove()">×</button>`;
        t.appendChild(d);
    }

    function addS(v="") {
        const d = document.createElement('div'); d.innerHTML = `<textarea class="st">${v}</textarea><button onclick="this.parentElement.remove()">×</button>`;
        document.getElementById('edit-steps').appendChild(d);
    }

    function initAdd() { curI=null; curImg=null; document.getElementById('edit-ings').innerHTML=""; document.getElementById('edit-steps').innerHTML=""; document.getElementById('edit-title').value=""; document.getElementById('edit-prev').style.display="none"; addG(); addS(); nav('edit'); }

    function initEdit(i) {
        curI=i; const r=db[i]; curImg=r.img; nav('edit');
        document.getElementById('edit-title').value=r.name; document.getElementById('edit-ings').innerHTML="";
        r.ings.forEach(g=>addG(g.n, g.it)); document.getElementById('edit-steps').innerHTML="";
        r.steps.forEach(s=>addS(s));
        if(curImg){ document.getElementById('edit-prev').src=curImg; document.getElementById('edit-prev').style.display='block'; }
    }

    function doSave() {
        const r = {
            name: document.getElementById('edit-title').value || "無題", img: curImg,
            ings: Array.from(document.querySelectorAll('.g-wrap')).map(g=>({ n: g.querySelector('.gn').value, it: Array.from(g.querySelectorAll('.ia > div')).map(d=>({ n: d.querySelector('.in').value, a: d.querySelector('.ia').value })).filter(x=>x.n) })),
            steps: Array.from(document.querySelectorAll('.st')).map(t=>t.value).filter(v=>v)
        };
        if(curI!==null) db[curI]=r; else db.push(r);
        localStorage.setItem('R_DB', JSON.stringify(db)); nav('list');
    }

    function toC(i, n) { db[i].ings.find(x=>x.n===n).it.forEach(x=>cart.push({ n:x.n, a:x.a, d:false })); localStorage.setItem('R_CART', JSON.stringify(cart)); alert("追加"); }
    function drawShop() {
        const t = document.getElementById('shop-target'); t.innerHTML = "";
        cart.forEach((x, i) => {
            const d = document.createElement('div'); d.innerHTML = `<input type="checkbox" ${x.d?'checked':''} onchange="tg(${i})">${x.n} ${x.a}`;
            t.appendChild(d);
        });
    }
    function tg(i) { cart[i].d = !cart[i].d; localStorage.setItem('R_CART', JSON.stringify(cart)); drawShop(); }
    function clrShop() { cart = cart.filter(x=>!x.d); localStorage.setItem('R_CART', JSON.stringify(cart)); drawShop(); }
    function del(i) { if(confirm("削除？")){ db.splice(i,1); localStorage.setItem('R_DB', JSON.stringify(db)); nav('list'); } }

    nav('list');
</script>
</body>
</html>
