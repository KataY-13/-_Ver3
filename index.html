<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:10px 10px 110px; }

.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
}
.tabbar button {
 flex:1;
 padding:25px;
 font-size:18px;
}

.grid {
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:6px;
}
.card { background:#fff; border-radius:8px; overflow:hidden; font-size:11px; }
.card img { width:100%; height:80px; object-fit:cover; }
.card div {
 text-align:center;
}
 
.groupTitle { background:#ddd; padding:10px; margin-top:10px; font-weight:bold; }

.detail-img {
 width:60%;
 max-width:250px;
 display:block;
 margin:10px auto;
 border-radius:10px;
}

#add input, #add textarea {
 font-size:16px;
 padding:12px;
 min-height:22px;
 width:100%;
 box-sizing:border-box;
}

.row { display:flex; gap:5px; margin-top:5px; }
.row input:nth-child(1){ flex:4; }
.row input:nth-child(2){ flex:3; }

.delBtn {
 width:1.2em;
 min-width:28px;
 height:44px;
 font-size:14px;
}

.groupBox { background:#fff; padding:8px; margin:8px 0; border-radius:8px; }

.stepBox { display:flex; gap:5px; align-items:center; margin:5px 0; }
.stepNumber { width:25px; text-align:right; }
.stepBox textarea { flex:1; min-height:80px; }

li {
 list-style:none;
 background:#fff;
 margin:6px 0;
 padding:10px;
 border-radius:8px;
 display:flex;
 align-items:center;
 gap:10px;
}

.gray { color:#aaa; text-decoration:line-through; }
.hidden { display:none; }

 .topbar {
 display:flex;
 justify-content:space-between;
 gap:8px;
  align-items:center;
}
/* ===== 全体をアプリ風 ===== */
body {
 background:#f2f2f7; /* iOSっぽい背景 */
}

/* カードを強化 */
.card, .groupBox, li {
 border-radius:12px;
 box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* タイトル */
h2, h3, h4 {
 margin:8px 0;
}

/* ===== ボタン ===== */
button:not(.tabbar button) {
 min-height:44px;
 font-size:16px;
 padding:10px 12px;
 border:none;
 border-radius:10px;
 background:#e5f0ff;
 color:#007aff;
}
button:not(.tabbar button) + button {
 margin-top:8px;
}
 
/* 押した時 */
button:active {
 opacity:0.7;
}

/* 削除ボタンだけ例外 */
.delBtn {
 background:#ff3b30;       /* 赤 */
 color:#fff;
}

/* 買い物チェック */
input[type="checkbox"] {
 transform:scale(1.3);
}

/* ===== 入力欄 ===== */
input, textarea {
 border:1px solid #ddd;
 border-radius:10px;
 background:#fff;
}

/* ===== グループタイトル ===== */
.groupTitle {
 background:#e5e5ea;
 border-radius:8px;
}
 #toast {
 position:fixed;
 bottom:80px;
 left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,0.8);
 color:#fff;
 padding:12px 20px;
 border-radius:20px;
 font-size:14px;
 opacity:0;
 transition:opacity 0.3s, bottom 0.3s;
 pointer-events:none;
}

#toast.show {
 opacity:1;
 bottom:100px;
}
 .linkBtn {
 display:block;
 text-align:center;
 margin:10px 0;
 padding:12px;
 border-radius:10px;
 background:#e5f0ff;
 color:#007aff;
 text-decoration:none;
 font-size:16px;
}

.linkBtn:active {
 background:#d0e2ff;
}
 /* カードを相対位置の基準にする */
.card { position: relative; }

/* 星マークのスタイル */
.fav-star {
  position: absolute;
  top: 5px;
  right: 5px;
  font-size: 24px;
  color: #ccc; /* 通常はグレー */
  cursor: pointer;
  text-shadow: 0 0 3px #fff;
  z-index: 10;
}

/* お気に入り登録時の色 */
.fav-star.active {
  color: #ffcc00; /* お気に入りは金色 */
}

/* 切り替えボタンのスタイル */
.filter-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
}
.filter-btn {
  flex: 1;
  max-width: 150px;
}
.filter-btn.active {
  background: #007aff !important;
  color: #fff !important;
}
</style>
</head>

<body>

<div class="container">
<div id="version" style="
 font-size:12px;
 color:#aaa;
 text-align:right;
 margin-bottom:4px;
">
 ver.4.00
</div>

<div class="topbar" id="listBar">
  <input id="search" placeholder="検索" oninput="renderList()" style="flex:1;">
  
  <button onclick="exportData()">バックアップ</button>

  <label style="padding:10px 12px; background:#e5f0ff; border-radius:10px; color:#007aff;">
    復元
    <input type="file" onchange="importData(this.files[0])" style="display:none;">
  </label>
</div>

<div id="filterArea" class="filter-bar">
  <button id="btnAll" class="filter-btn active" onclick="setFilter('all')">すべて</button>
  <button id="btnFav" class="filter-btn" onclick="setFilter('fav')">お気に入り★</button>
</div>

<div id="list"></div>
<div id="detail" class="hidden"></div>

<div id="add" class="hidden">
<div class="topbar">
  <h3 style="margin:0;">レシピ登録</h3>
  <div style="display:flex; gap:6px;">
    <button onclick="saveRecipe()">保存</button>
    <button onclick="clearForm()">クリア</button>
  </div>
</div>
 
<input id="sourceUrl" placeholder="ソース元URL">
<input id="title" placeholder="タイトル">
<input type="file" id="imageFile">
<input id="group" placeholder="主菜など">

<h4>材料</h4>
<div id="ingredientsArea"></div>
<button onclick="addGroup()">材料グループ追加</button>

<h4>作り方</h4>
<div id="stepsArea"></div>
<button onclick="addStep()">工程追加</button>
</div>

<div id="shopping" class="hidden">
<div class="topbar">
<h3>買い物リスト</h3>
<button onclick="clearShopping()">クリア</button>
</div>
<input id="manualItem" placeholder="材料">
<input id="manualAmount" placeholder="分量">
<button onclick="addManual()">追加</button>
<ul id="shopList"></ul>
</div>

<div id="stock" class="hidden">
<div class="topbar">
<h3>在庫リスト</h3>
</div>
<input id="stockItem" placeholder="在庫アイテム名">
<button onclick="addStock()">追加</button>
<ul id="stockList" style="margin-top:10px; padding:0;"></ul>
</div>

</div>

<div class="tabbar">
<button onclick="show('list')">一覧</button>
<button onclick="show('add')">登録</button>
<button onclick="show('shopping')">買い物</button>
<button onclick="show('stock')">在庫</button>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");
let stock = JSON.parse(localStorage.getItem("stockItems")||"[]"); 

let editIndex=null;
let currentImage = null;
let formImage = null;
let openGroups={};
let currentFilter = 'all';

/* --- スワイプ管理用変数 --- */
let startX = 0;
let startY = 0;
const pageOrder = ['list', 'add', 'shopping', 'stock'];
let currentPage = 'list';

/* 画面切り替え */
function show(p){
  currentPage = p; // 現在のページを保持
  list.classList.add("hidden");
  detail.classList.add("hidden");
  add.classList.add("hidden");
  document.getElementById("shopping").classList.add("hidden");
  document.getElementById("stock").classList.add("hidden"); 

  document.getElementById("listBar").style.display = (p==="list") ? "flex" : "none";
  document.getElementById("filterArea").style.display = (p==="list") ? "flex" : "none";

  if(p==="list") list.classList.remove("hidden");
  if(p==="add") add.classList.remove("hidden");
  if(p==="shopping"){ 
    document.getElementById("shopping").classList.remove("hidden"); 
    renderShopping(); 
  }
  if(p==="stock"){ 
    document.getElementById("stock").classList.remove("hidden"); 
    renderStock(); 
  }
  
  // タブの見た目も更新（activeなボタンを判別しやすくするため）
  document.querySelectorAll('.tabbar button').forEach(btn => {
    btn.style.color = btn.innerText === getTabName(p) ? '#007aff' : '#999';
  });
}

function getTabName(p) {
  if(p==='list') return '一覧';
  if(p==='add') return '登録';
  if(p==='shopping') return '買い物';
  if(p==='stock') return '在庫';
}

/* --- スワイプ機能の実装 (ver.4.00) --- */
window.addEventListener('touchstart', (e) => {
  startX = e.touches[0].pageX;
  startY = e.touches[0].pageY;
}, { passive: true });

window.addEventListener('touchend', (e) => {
  let endX = e.changedTouches[0].pageX;
  let endY = e.changedTouches[0].pageY;
  let diffX = endX - startX;
  let diffY = endY - startY;

  // 縦スワイプ防止 & 一定距離(50px)以上のスワイプのみ反応
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    
    // 1. 詳細画面が表示されている場合
    if (!detail.classList.contains("hidden")) {
      if (diffX > 0) { // 右スワイプ
        show('list'); // 一覧に戻る
      }
      return; // 詳細画面時はここで終了
    }

    // 2. 通常のタブ切り替え
    let currentIndex = pageOrder.indexOf(currentPage);
    if (diffX > 0) { // 右スワイプ -> 左の画面へ
      let nextIndex = (currentIndex - 1 + pageOrder.length) % pageOrder.length;
      show(pageOrder[nextIndex]);
    } else { // 左スワイプ -> 右の画面へ
      let nextIndex = (currentIndex + 1) % pageOrder.length;
      show(pageOrder[nextIndex]);
    }
  }
}, { passive: true });

/* --- 以下、ベースコードの機能 --- */

function setFilter(mode) {
 currentFilter = mode;
 document.getElementById("btnAll").classList.toggle("active", mode === 'all');
 document.getElementById("btnFav").classList.toggle("active", mode === 'fav');
 renderList();
}

function toggleFavorite(e, index) {
 e.stopPropagation();
 recipes[index].favorite = !recipes[index].favorite;
 localStorage.setItem("recipes", JSON.stringify(recipes));
 renderList();
}

document.getElementById("imageFile").addEventListener("change", function(e){
 const file = e.target.files[0];
 if(!file) {
   formImage = null;
   return;
 }
 const reader = new FileReader();
 reader.onload = function(evt){
   const img = new Image();
   img.onload = function() {
     const canvas = document.createElement('canvas');
     const MAX_WIDTH = 500;
     const scaleSize = MAX_WIDTH / img.width;
     canvas.width = MAX_WIDTH;
     canvas.height = img.height * scaleSize;
     const ctx = canvas.getContext('2d');
     ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
     formImage = canvas.toDataURL('image/jpeg', 0.7);
   };
   img.src = evt.target.result;
 };
 reader.readAsDataURL(file);
});

function renderList(){
 list.innerHTML="";
 let key = toKatakana(search.value.toLowerCase());
 let groups={};
 recipes.forEach((r,i)=>{
   let hit = toKatakana(r.title.toLowerCase()).includes(key);
   if(currentFilter === 'fav' && !r.favorite) hit = false;
   if(!hit) return;
   let g = (r.group || "").trim() || "未分類";
   if(!groups[g]) groups[g]=[];
   groups[g].push({r,i});
 });
 Object.keys(groups).sort().forEach(g=>{
   if(openGroups[g] === undefined) openGroups[g] = true;
   let box = document.createElement("div");
   let title=document.createElement("div");
   title.className="groupTitle";
   title.textContent=g;
   title.onclick=()=>{ openGroups[g]=!openGroups[g]; renderList(); };
   box.appendChild(title);
   if(openGroups[g]){
     let wrap=document.createElement("div");
     wrap.className="grid";
     groups[g].forEach(obj=>{
       let r=obj.r;
       let div=document.createElement("div");
       div.className="card";
       div.innerHTML = `
         <div class="fav-star ${r.favorite ? 'active' : ''}" onclick="toggleFavorite(event, ${obj.i})">★</div>
         <img src="${r.image||''}">
         <div>${r.title}</div>
       `;
       div.onclick=()=>detailView(obj.i);
       wrap.appendChild(div);
     });
     box.appendChild(wrap);
   }
   list.appendChild(box);
 });
}

function detailView(i){
 let r=recipes[i];
 document.getElementById("listBar").style.display = "none";
 document.getElementById("filterArea").style.display = "none";
 let html = `<div class="topbar"><div style="flex:1; text-align:center; font-weight:bold;">${r.title}</div></div>`;
 detail.classList.remove("hidden");
 list.classList.add("hidden");
 if(r.sourceUrl) html += `<a href="${r.sourceUrl}" target="_blank" class="linkBtn">レシピ元を見る</a>`;
 if(r.image) html+=`<img src="${r.image}" class="detail-img">`;
 r.ingredients.forEach(g=>{
  html+=`<h3>${g.name}</h3>`;
  g.items.forEach(it=>{
   html+=`<label><input type="checkbox" data-name="${it.name}" data-amount="${it.amount}">${it.name} (${it.amount})</label><br>`;
  });
 });
 html+=`<h3>作り方</h3>`;
 r.steps.forEach(s=> html+=s+"<br>");
 html+=`<button onclick="addShopping()">買い物リストへ追加</button>`;
 html+=`<button onclick="editRecipe(${i})">編集</button>`;
 html+=`<button onclick="deleteRecipe(${i})">削除</button>`;
 detail.innerHTML=html;
}

function addShopping(){
 let count=0;
 document.querySelectorAll("#detail input:checked").forEach(c=>{
  shopping.push({name:c.dataset.name,amount:c.dataset.amount,checked:false});
  count++;
 });
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
 if(count>0) showToast("買い物リストに追加しました");
}

function addManual(){
 shopping.push({name:manualItem.value,amount:manualAmount.value,checked:false});
 manualItem.value="";
 manualAmount.value="";
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function renderShopping(){
 shopList.innerHTML="";
 shopping.sort((a,b)=>a.checked - b.checked);
 shopping.forEach((s,i)=>{
  let li=document.createElement("li");
  li.className=s.checked?"gray":"";
  li.innerHTML=`<input type="checkbox" ${s.checked?"checked":""} onchange="toggle(${i})">${s.name} (${s.amount})<button onclick="removeItem(${i})" style="margin-left:auto;">×</button>`;
  shopList.appendChild(li);
 });
}

function toggle(i){
 shopping[i].checked=!shopping[i].checked;
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function removeItem(i){
 shopping.splice(i,1);
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function clearShopping(){
 shopping=[];
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function addStock(){
 if(!stockItem.value) return;
 stock.push(stockItem.value);
 stockItem.value="";
 localStorage.setItem("stockItems", JSON.stringify(stock));
 renderStock();
}

function renderStock(){
 let sl = document.getElementById("stockList");
 sl.innerHTML = "";
 stock.forEach((item, i) => {
  let li = document.createElement("li");
  li.innerHTML = `<span>${item}</span><button onclick="removeStock(${i})" style="margin-left:auto;">×</button>`;
  sl.appendChild(li);
 });
}

function removeStock(i){
 stock.splice(i,1);
 localStorage.setItem("stockItems", JSON.stringify(stock));
 renderStock();
}

function saveRecipe(){
 function finish(){
   let ing=[];
   ingredientsArea.querySelectorAll(".groupBox").forEach(g=>{
     let items=[];
     g.querySelectorAll(".row").forEach(d=>{
       let i=d.querySelectorAll("input");
       items.push({name:i[0].value,amount:i[1].value});
     });
     ing.push({name:g.querySelector("input").value,items});
   });
   let steps=[];
   stepsArea.querySelectorAll("textarea").forEach((t,i)=>{
     steps.push((i+1)+". "+t.value);
   });
   let data={
     group: group.value,
     title: title.value,
     image: formImage,
     sourceUrl: sourceUrl.value,
     ingredients: ing,
     steps,
     favorite: editIndex !== null ? recipes[editIndex].favorite : false
   };
   if(editIndex !== null){
     recipes[editIndex] = data;
     editIndex = null;
   } else {
     recipes.push(data);
   }
   localStorage.setItem("recipes", JSON.stringify(recipes));
   clearForm();
   show("list");
   renderList();
   showToast("保存しました");
 }
 finish();
}

function editRecipe(i){
 let r=recipes[i];
 editIndex=i;
 formImage = r.image;
 show("add");
 title.value=r.title;
 group.value=r.group;
 sourceUrl.value = r.sourceUrl || "";
 ingredientsArea.innerHTML="";
 r.ingredients.forEach(g=>{
  addGroup();
  let gBox = ingredientsArea.lastChild;
  gBox.querySelector("input").value = g.name;
  let itemsDiv = gBox.querySelector(".items");
  itemsDiv.innerHTML="";
  g.items.forEach(it=>{
   addItem(itemsDiv);
   let row = itemsDiv.lastChild;
   let inputs = row.querySelectorAll("input");
   inputs[0].value = it.name;
   inputs[1].value = it.amount;
  });
 });
 stepsArea.innerHTML="";
 r.steps.forEach(s=>{
  addStep();
  let t = stepsArea.lastChild.querySelector("textarea");
  t.value = s.replace(/^\d+\.\s*/, "");
 });
 updateStepNumbers();
}

function deleteRecipe(i){
 if(!confirm("このレシピを削除しますか？")) return;
 recipes.splice(i,1);
 localStorage.setItem("recipes",JSON.stringify(recipes));
 show("list");
 renderList();
}

function addGroup(){
 let div=document.createElement("div");
 div.className="groupBox";
 div.innerHTML=`<div style="display:flex; align-items:center; gap:5px;"><input placeholder="グループ名" style="flex:1;"><button class="delBtn" onclick="this.closest('.groupBox').remove()">×</button></div><div class="items"></div><button onclick="addItem(this)">材料追加</button>`;
 ingredientsArea.appendChild(div);
 addItem(div.querySelector(".items"));
}

function addItem(container){
 if(container.tagName === "BUTTON") container = container.previousElementSibling;
 let row=document.createElement("div");
 row.className="row";
 row.innerHTML=`<input placeholder="材料"><input placeholder="分量"><button class="delBtn" onclick="this.parentNode.remove()">×</button>`;
 container.appendChild(row);
}

function addStep(){
 let div=document.createElement("div");
 div.className="stepBox";
 div.innerHTML=`<div class="stepNumber"></div><textarea></textarea><button class="delBtn" onclick="this.parentNode.remove();updateStepNumbers()">×</button>`;
 stepsArea.appendChild(div);
 updateStepNumbers();
}

function updateStepNumbers(){
 document.querySelectorAll(".stepBox").forEach((s,i)=>{
  s.querySelector(".stepNumber").textContent=(i+1)+".";
 });
}

function clearForm(){
 sourceUrl.value="";
 title.value="";
 group.value="";
 imageFile.value="";
 ingredientsArea.innerHTML="";
 stepsArea.innerHTML="";
 editIndex=null;
 currentImage=null;
 formImage = null;
}

renderList();

function showToast(msg){
 let t=document.getElementById("toast");
 t.textContent=msg;
 t.classList.add("show");
 setTimeout(()=>{ t.classList.remove("show"); },1500);
}

function exportData(){
 let data = localStorage.getItem("recipes") || "[]";
 let blob = new Blob([data], {type:"application/json"});
 let a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = "recipes_backup.json";
 a.click();
}

function importData(file){
 if(!file) return;
 let reader = new FileReader();
 reader.onload = e => {
  localStorage.setItem("recipes", e.target.result);
  recipes = JSON.parse(e.target.result);
  renderList();
  showToast("復元しました");
 };
 reader.readAsText(file);
}

function toKatakana(str){
 return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
}

// 初期タブ表示の見た目調整
show('list');
</script>
<div id="toast"></div>
</body>
</html>
