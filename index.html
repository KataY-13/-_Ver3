<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:10px 10px 110px; }

.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
}
.tabbar button {
 flex:1;
 padding:25px;
 font-size:18px;
}

.grid {
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:6px;
}
.card { background:#fff; border-radius:8px; overflow:hidden; font-size:11px; }
.card img { width:100%; height:80px; object-fit:cover; }

.groupTitle { background:#ddd; padding:10px; margin-top:10px; font-weight:bold; }

.detail-img {
 width:60%;
 max-width:250px;
 display:block;
 margin:10px auto;
 border-radius:10px;
}

#add input, #add textarea {
 font-size:16px;
 padding:12px;
 min-height:22px;
 width:100%;
 box-sizing:border-box;
}

.row { display:flex; gap:5px; margin-top:5px; }
.row input:nth-child(1){ flex:4; }
.row input:nth-child(2){ flex:3; }

.delBtn {
 width:1.2em;
 min-width:28px;
 height:44px;
 font-size:14px;
}

.groupBox { background:#fff; padding:8px; margin:8px 0; border-radius:8px; }

.stepBox { display:flex; gap:5px; align-items:center; margin:5px 0; }
.stepNumber { width:25px; text-align:right; }
.stepBox textarea { flex:1; min-height:80px; }

li {
 list-style:none;
 background:#fff;
 margin:6px 0;
 padding:10px;
 border-radius:8px;
 display:flex;
 align-items:center;
 gap:10px;
}

.gray { color:#aaa; text-decoration:line-through; }
.hidden { display:none; }

.topbar { display:flex; justify-content:space-between; }
/* ===== 全体をアプリ風 ===== */
body {
 background:#f2f2f7; /* iOSっぽい背景 */
}

/* カードを強化 */
.card, .groupBox, li {
 border-radius:12px;
 box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* タイトル */
h2, h3, h4 {
 margin:8px 0;
}

/* ===== ボタン ===== */
button:not(.tabbar button) {
 min-height:44px;
 font-size:16px;
 padding:10px 12px;
 border:none;
 border-radius:10px;
 background:#e5f0ff;
 color:#007aff;
}
button:not(.tabbar button) + button {
 margin-top:8px;
}
 
/* 押した時 */
button:active {
 opacity:0.7;
}

/* 削除ボタンだけ例外 */
.delBtn {
 background:#ff3b30;       /* 赤 */
 color:#fff;
}

/* 買い物チェック */
input[type="checkbox"] {
 transform:scale(1.3);
}

/* ===== 入力欄 ===== */
input, textarea {
 border:1px solid #ddd;
 border-radius:10px;
 background:#fff;
}

/* ===== グループタイトル ===== */
.groupTitle {
 background:#e5e5ea;
 border-radius:8px;
}
 #toast {
 position:fixed;
 bottom:80px;
 left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,0.8);
 color:#fff;
 padding:12px 20px;
 border-radius:20px;
 font-size:14px;
 opacity:0;
 transition:opacity 0.3s, bottom 0.3s;
 pointer-events:none;
}

#toast.show {
 opacity:1;
 bottom:100px;
}
 .linkBtn {
 display:block;
 text-align:center;
 margin:10px 0;
 padding:12px;
 border-radius:10px;
 background:#e5f0ff;
 color:#007aff;
 text-decoration:none;
 font-size:16px;
}

.linkBtn:active {
 background:#d0e2ff;
}
</style>
</head>

<body>

<div class="container">

<input id="search" placeholder="検索" oninput="renderList()">

<div id="list"></div>
<div id="detail" class="hidden"></div>

<div id="add" class="hidden">
<h3>レシピ登録</h3>
 
<input id="sourceUrl" placeholder="ソース元URL">
<input id="title" placeholder="タイトル">
<input type="file" id="imageFile">
<input id="group" placeholder="主菜など">

<h4>材料</h4>
<div id="ingredientsArea"></div>
<button onclick="addGroup()">材料グループ追加</button>

<h4>作り方</h4>
<div id="stepsArea"></div>
<button onclick="addStep()">工程追加</button>

<button onclick="saveRecipe()">保存</button>
<button onclick="clearForm()">クリア</button>
</div>

<div id="shopping" class="hidden">
<div class="topbar">
<h3>買い物リスト</h3>
<button onclick="clearShopping()">クリア</button>
</div>

<input id="manualItem" placeholder="材料">
<input id="manualAmount" placeholder="分量">
<button onclick="addManual()">追加</button>

<ul id="shopList"></ul>
</div>

</div>

<div class="tabbar">
<button onclick="show('list')">一覧</button>
<button onclick="show('add')">登録</button>
<button onclick="show('shopping')">買い物</button>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");

let editIndex=null;
let openGroups={};

/* 画面 */
function show(p){
 list.classList.add("hidden");
 detail.classList.add("hidden");
 add.classList.add("hidden");
 shoppingDiv=document.getElementById("shopping");
 shoppingDiv.classList.add("hidden");

 search.style.display = (p==="list")?"block":"none";

 if(p==="list") list.classList.remove("hidden");
 if(p==="add") add.classList.remove("hidden");
 if(p==="shopping"){ shoppingDiv.classList.remove("hidden"); renderShopping(); }
}

/* 一覧（グループ並列修正） */
function renderList(){
 list.innerHTML="";
 let key=search.value.toLowerCase();
 let groups={};

 let data={
 group: group.value.trim() || "未分類",
 title:title.value,
 image:img,
 ingredients:ing,
 steps
};

 Object.keys(groups).sort().forEach(g=>{
  let title=document.createElement("div");
  title.className="groupTitle";
  title.textContent=g;
  title.onclick=()=>{ openGroups[g]=!openGroups[g]; renderList(); };
  list.appendChild(title);

  if(!openGroups[g]) return;

  let wrap=document.createElement("div");
  wrap.className="grid";

  groups[g].forEach(obj=>{
   let r=obj.r;

   let hit=r.title.toLowerCase().includes(key);
   r.ingredients.forEach(gr=>{
    gr.items.forEach(it=>{
     if(it.name.toLowerCase().includes(key)) hit=true;
    });
   });
   if(!hit) return;

   let div=document.createElement("div");
   div.className="card";
   div.innerHTML=`<img src="${r.image||''}"><div>${r.title}</div>`;
   div.onclick=()=>detailView(obj.i);
   wrap.appendChild(div);
  });

  list.appendChild(wrap);
 });
}

/* 詳細（ボタン復活） */
function detailView(i){
 let r=recipes[i];
 detail.classList.remove("hidden");
 list.classList.add("hidden");

 if(r.sourceUrl){
 html += `
 <a href="${r.sourceUrl}" target="_blank" class="linkBtn">
  レシピ元を見る
 </a>`;
}
 if(r.image) html+=`<img src="${r.image}" class="detail-img">`;

 r.ingredients.forEach(g=>{
  html+=`<h3>${g.name}</h3>`;
  g.items.forEach(it=>{
   html+=`<label><input type="checkbox" data-name="${it.name}" data-amount="${it.amount}">
   ${it.name} (${it.amount})</label><br>`;
  });
 });

 html+=`<h3>作り方</h3>`;
 r.steps.forEach(s=> html+=s+"<br>");

 html+=`<button onclick="addShopping()">買い物リストへ追加</button>`;
 html+=`<button onclick="editRecipe(${i})">編集</button>`;
 html+=`<button onclick="deleteRecipe(${i})">削除</button>`;

 detail.innerHTML=html;
}

/* 買い物 */
function addShopping(){
 let count=0;

 document.querySelectorAll("#detail input:checked").forEach(c=>{
  shopping.push({name:c.dataset.name,amount:c.dataset.amount,checked:false});
  count++;
 });

 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();

 if(count>0){
  showToast("買い物リストに追加しました");
 }
}
 
function addManual(){
 shopping.push({name:manualItem.value,amount:manualAmount.value,checked:false});
 manualItem.value="";
 manualAmount.value="";
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function renderShopping(){
 shopList.innerHTML="";
 shopping.sort((a,b)=>a.checked - b.checked);

 shopping.forEach((s,i)=>{
  let li=document.createElement("li");
  li.className=s.checked?"gray":"";

  li.innerHTML=`
   <input type="checkbox" ${s.checked?"checked":""} onchange="toggle(${i})">
   ${s.name} (${s.amount})
   <button onclick="removeItem(${i})">×</button>
  `;
  shopList.appendChild(li);
 });
}

function toggle(i){
 shopping[i].checked=!shopping[i].checked;
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function removeItem(i){
 shopping.splice(i,1);
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function clearShopping(){
 shopping=[];
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

/* 登録（画像修正） */
function saveRecipe(){
 let file=imageFile.files[0];

 function finish(img){
  let ing=[];
  ingredientsArea.querySelectorAll(".groupBox").forEach(g=>{
   let items=[];
   g.querySelectorAll(".row").forEach(d=>{
    let i=d.querySelectorAll("input");
    items.push({name:i[0].value,amount:i[1].value});
   });
   ing.push({name:g.querySelector("input").value,items});
  });

  let steps=[];
  stepsArea.querySelectorAll("textarea").forEach((t,i)=>{
   steps.push((i+1)+". "+t.value);
  });
  
let data={
 group: group.value.trim() || "未分類",
 title:title.value,
 image:img,
 sourceUrl: sourceUrl.value, // ← 追加
 ingredients:ing,
 steps
};

  if(editIndex!==null){ recipes[editIndex]=data; editIndex=null; }
  else recipes.push(data);

  localStorage.setItem("recipes",JSON.stringify(recipes));

  clearForm();
  show("list");
  renderList();
 }

 if(file){
  let r=new FileReader();
  r.onload=e=>finish(e.target.result);
  r.readAsDataURL(file);
 }else finish(null);
}

/* 編集 */
function editRecipe(i){
 let r=recipes[i];
 editIndex=i;
 show("add");
 title.value=r.title;
 group.value=r.group;
 sourceUrl.value = r.sourceUrl || "";
}

/* 削除 */
function deleteRecipe(i){
 if(!confirm("このレシピを削除しますか？")) return;
 recipes.splice(i,1);
 localStorage.setItem("recipes",JSON.stringify(recipes));
 show("list");
 renderList();
}
/* 入力 */
function addGroup(){
 let div=document.createElement("div");
 div.className="groupBox";
 div.innerHTML=`
  <div style="display:flex; align-items:center; gap:5px;">
    <input placeholder="グループ名" style="flex:1;">
    <button class="delBtn" onclick="this.closest('.groupBox').remove()">×</button>
  </div>
  <div class="items"></div>
  <button onclick="addItem(this)">材料追加</button>
 `;
 ingredientsArea.appendChild(div);
 // 最初に1行入れる
 addItem(div.querySelector(".items"));
}

function addItem(container){

 // ボタンから押された場合の対応
 if(container.tagName === "BUTTON"){
  container = container.previousElementSibling;
 }

 let row=document.createElement("div");
 row.className="row";
 row.innerHTML=`
  <input placeholder="材料">
  <input placeholder="分量">
  <button class="delBtn" onclick="this.parentNode.remove()">×</button>
 `;
 container.appendChild(row);
}

function addStep(){
 let div=document.createElement("div");
 div.className="stepBox";
 div.innerHTML=`<div class="stepNumber"></div><textarea></textarea><button class="delBtn" onclick="this.parentNode.remove();updateStepNumbers()">×</button>`;
 stepsArea.appendChild(div);
 updateStepNumbers();
}

function updateStepNumbers(){
 document.querySelectorAll(".stepBox").forEach((s,i)=>{
  s.querySelector(".stepNumber").textContent=(i+1)+".";
 });
}

function clearForm(){
 title.value="";
 group.value="";
 imageFile.value="";
 ingredientsArea.innerHTML="";
 stepsArea.innerHTML="";
 editIndex=null;
}

renderList();
 function showToast(msg){
 let t=document.getElementById("toast");
 t.textContent=msg;
 t.classList.add("show");

 setTimeout(()=>{
  t.classList.remove("show");
 },1500);
}
</script>
<div id="toast"></div>
</body>
</html>
