<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レシピアプリ</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:10px 10px 110px; }

/* タブ */
.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
}
.tabbar button {
 flex:1;
 padding:27px;
 font-size:18px;
}

/* グリッド */
.grid {
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:6px;
}

.card {
 background:#fff;
 border-radius:8px;
 overflow:hidden;
 font-size:11px;
}

.card img {
 width:100%;
 height:80px;
 object-fit:cover;
}

/* 詳細画像 */
.detail-img {
 width:60%;
 max-width:250px;
 display:block;
 margin:10px auto;
 border-radius:10px;
}

/* グループ */
.groupTitle {
 background:#ddd;
 padding:10px;
 margin-top:10px;
 font-weight:bold;
}

/* 登録UI */
#add input, #add textarea, #add button {
 font-size:18px;
 padding:12px;
 margin:6px 0;
 width:100%;
 box-sizing:border-box;
}

.row {
 display:flex;
 gap:5px;
}
.row input {
 flex:1;
}
.delBtn {
 width:40px;
 background:#eee;
}

/* ボタン大 */
.bigBtn {
 font-size:20px;
 padding:12px;
 margin:10px 0;
}

/* 買い物 */
li {
 list-style:none;
 background:#fff;
 margin:6px 0;
 padding:10px;
 border-radius:8px;
 display:flex;
 align-items:center;
 gap:10px;
}

.gray { color:#aaa; text-decoration:line-through; }
.hidden { display:none; }

.topbar {
 display:flex;
 justify-content:space-between;
 align-items:center;
}
</style>
</head>

<body>

<div class="container">

<input id="search" placeholder="検索" oninput="renderList()">

<div id="list"></div>
<div id="detail" class="hidden"></div>

<div id="add" class="hidden">
<h3>レシピ登録</h3>

<input id="title" placeholder="タイトル">
<input type="file" id="imageFile">
<input id="group" placeholder="主菜など">

<div id="ingredientsArea"></div>
<button onclick="addGroup()">材料グループ追加</button>

<div id="stepsArea"></div>
<button onclick="addStep()">工程追加</button>

<button onclick="saveRecipe()">保存</button>
<button onclick="clearForm()">クリア</button>
</div>

<div id="shopping" class="hidden">
<div class="topbar">
<h3>買い物リスト</h3>
<button class="bigBtn" onclick="clearShopping()">クリア</button>
</div>
<ul id="shopList"></ul>
</div>

</div>

<div class="tabbar">
<button onclick="show('list')">一覧</button>
<button onclick="show('add')">登録</button>
<button onclick="show('shopping')">買い物</button>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");
let openGroups={};
let dragIndex=null;

/* 画面切替 */
function show(p){
 list.classList.add("hidden");
 detail.classList.add("hidden");
 add.classList.add("hidden");
 shoppingDiv=document.getElementById("shopping");
 shoppingDiv.classList.add("hidden");

 search.style.display = (p==="list")?"block":"none";

 if(p==="list") list.classList.remove("hidden");
 if(p==="add") add.classList.remove("hidden");
 if(p==="shopping"){ shoppingDiv.classList.remove("hidden"); renderShopping(); }
}

/* 一覧（並び替え対応） */
function renderList(){
 list.innerHTML="";
 let groups={};

 recipes.forEach((r,i)=>{
  let g=r.group && r.group.trim()?r.group.trim():"未分類";
  if(!groups[g]) groups[g]=[];
  groups[g].push({r,i});
 });

 Object.keys(groups).forEach(g=>{
  let title=document.createElement("div");
  title.className="groupTitle";
  title.textContent=g;
  title.onclick=()=>{ openGroups[g]=!openGroups[g]; renderList(); };
  list.appendChild(title);

  if(!openGroups[g]) return;

  let wrap=document.createElement("div");
  wrap.className="grid";

  groups[g].forEach(obj=>{
   let div=document.createElement("div");
   div.className="card";

   div.innerHTML=`
    <img src="${obj.r.image||''}">
    <div>${obj.r.title}</div>
   `;

   div.onclick=()=>detailView(obj.i);

   /* ドラッグ */
   div.ontouchstart=()=>dragIndex=obj.i;
   div.ontouchmove=e=>{
    let el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
    if(!el || !el.closest(".card")) return;
    let idx=[...wrap.children].indexOf(el.closest(".card"));
    if(idx!==dragIndex){
      let temp=recipes[dragIndex];
      recipes.splice(dragIndex,1);
      recipes.splice(idx,0,temp);
      dragIndex=idx;
      localStorage.setItem("recipes",JSON.stringify(recipes));
      renderList();
    }
   };

   wrap.appendChild(div);
  });

  list.appendChild(wrap);
 });
}

/* 詳細 */
function detailView(i){
 let r=recipes[i];
 detail.classList.remove("hidden");
 list.classList.add("hidden");

 let html=`<h2>${r.title}</h2>`;
 if(r.image) html+=`<img src="${r.image}" class="detail-img">`;

 r.ingredients.forEach(g=>{
  html+=`<h3>${g.name}</h3>`;
  g.items.forEach(it=>{
   html+=`<label><input type="checkbox" data-name="${it.name}" data-amount="${it.amount}">
   ${it.name} (${it.amount})</label><br>`;
  });
 });

 html+=`<h3>作り方</h3>`;
 r.steps.forEach(s=> html+=s+"<br>");

 html+=`<button class="bigBtn" onclick="addShopping()">買い物リストへ追加</button>`;
 html+=`<button class="bigBtn" onclick="editRecipe(${i})">編集</button>`;
 html+=`<button class="bigBtn" onclick="deleteRecipe(${i})">削除</button>`;
 html+=`<button onclick="show('list')">戻る</button>`;

 detail.innerHTML=html;
}

/* 分量合計 */
function parseAmount(str){
 let n=parseFloat(str);
 return {n,unit:str.replace(n,"")};
}

function addShopping(){
 document.querySelectorAll("#detail input:checked").forEach(c=>{
  let f=shopping.find(s=>s.name===c.dataset.name);
  if(f){
   let a=parseAmount(f.amount);
   let b=parseAmount(c.dataset.amount);
   if(a.unit===b.unit) f.amount=(a.n+b.n)+a.unit;
   else f.amount+=" + "+c.dataset.amount;
  }else{
   shopping.push({name:c.dataset.name,amount:c.dataset.amount,checked:false});
  }
 });
 localStorage.setItem("shopping",JSON.stringify(shopping));
 alert("追加しました");
}

/* 買い物（ドラッグ） */
function renderShopping(){
 shopList.innerHTML="";
 shopping.forEach((s,i)=>{
  let li=document.createElement("li");
  li.className=s.checked?"gray":"";

  li.innerHTML=`
  <input type="checkbox" ${s.checked?"checked":""} onchange="toggle(${i})">
  ${s.name} (${s.amount})
  `;

  li.ontouchstart=()=>dragIndex=i;
  li.ontouchmove=e=>{
   let el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
   if(!el || !el.closest("li")) return;
   let idx=[...shopList.children].indexOf(el.closest("li"));
   if(idx!==dragIndex){
    let temp=shopping[dragIndex];
    shopping.splice(dragIndex,1);
    shopping.splice(idx,0,temp);
    dragIndex=idx;
    renderShopping();
   }
  };

  shopList.appendChild(li);
 });
}

function toggle(i){
 shopping[i].checked=!shopping[i].checked;
 renderShopping();
}

function clearShopping(){
 shopping=[];
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

/* 登録 */
function saveRecipe(){
 let file=imageFile.files[0];

 function finish(img){
  let ing=[];
  ingredientsArea.childNodes.forEach(g=>{
   let items=[];
   g.querySelectorAll(".row").forEach(d=>{
    let i=d.querySelectorAll("input");
    items.push({name:i[0].value,amount:i[1].value});
   });
   ing.push({name:g.children[0].value,items});
  });

  let steps=[];
  stepsArea.querySelectorAll("textarea").forEach((t,i)=>{
   steps.push((i+1)+". "+t.value);
  });

  recipes.push({group:group.value,title:title.value,image:img,ingredients:ing,steps});
  localStorage.setItem("recipes",JSON.stringify(recipes));
  clearForm();
  show("list");
  renderList();
 }

 if(file){
  let r=new FileReader();
  r.onload=e=>finish(e.target.result);
  r.readAsDataURL(file);
 }else finish(null);
}

/* 編集削除 */
function editRecipe(i){
 let r=recipes[i];
 show("add");
 title.value=r.title;
 group.value=r.group;
}

function deleteRecipe(i){
 if(confirm("削除する？")){
  recipes.splice(i,1);
  localStorage.setItem("recipes",JSON.stringify(recipes));
  renderList();
  show("list");
 }
}

/* 入力 */
function addGroup(){
 let div=document.createElement("div");
 div.innerHTML=`
 <input placeholder="グループ名">
 <button onclick="this.parentNode.remove()">削除</button>
 <div class="items"></div>
 <button onclick="addItem(this)">材料追加</button>
 `;
 ingredientsArea.appendChild(div);
}

function addItem(btn){
 let d=btn.previousElementSibling;
 let row=document.createElement("div");
 row.className="row";
 row.innerHTML=`
 <input placeholder="材料">
 <input placeholder="分量">
 <button class="delBtn" onclick="this.parentNode.remove()">×</button>
 `;
 d.appendChild(row);
}

function addStep(){
 let d=document.createElement("div");
 d.innerHTML=`<textarea></textarea>`;
 stepsArea.appendChild(d);
}

function clearForm(){
 title.value="";
 group.value="";
 imageFile.value="";
 ingredientsArea.innerHTML="";
 stepsArea.innerHTML="";
}

renderList();
</script>

</body>
</html>
