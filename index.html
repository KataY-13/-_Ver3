<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レシピアプリ</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:10px 10px 90px; }

/* タブ */
.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
}
.tabbar button {
 flex:1;
 padding:18px;
 font-size:16px;
}

/* グリッド */
.grid {
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:6px;
}

.card {
 background:#fff;
 border-radius:8px;
 overflow:hidden;
 font-size:12px;
}
.card img {
 width:100%;
 height:80px;
 object-fit:cover;
}

/* グループ */
.groupTitle {
 background:#ddd;
 padding:10px;
 margin-top:10px;
 font-weight:bold;
}

/* 買い物 */
li {
 list-style:none;
 background:#fff;
 margin:6px 0;
 padding:10px;
 border-radius:8px;
}

.gray {
 color:#aaa;
 text-decoration:line-through;
}

.hidden { display:none; }
.dragging { opacity:0.5; }
</style>
</head>

<body>

<div class="container">

<input id="search" placeholder="検索" oninput="renderList()">

<div id="list"></div>
<div id="detail" class="hidden"></div>

<div id="add" class="hidden">
<h3>レシピ登録</h3>
<input id="group" placeholder="主菜など">
<input id="title" placeholder="タイトル">
<input type="file" id="imageFile">

<div id="ingredientsArea"></div>
<button onclick="addGroup()">材料グループ追加</button>

<div id="stepsArea"></div>
<button onclick="addStep()">工程追加</button>

<button onclick="saveRecipe()">保存</button>
<button onclick="clearForm()">クリア</button>
</div>

<div id="shopping" class="hidden">
<h3>買い物リスト</h3>
<ul id="shopList"></ul>
<button onclick="clearShopping()">クリア</button>
</div>

</div>

<div class="tabbar">
<button onclick="show('list')">一覧</button>
<button onclick="show('add')">登録</button>
<button onclick="show('shopping')">買い物</button>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");
let draft = JSON.parse(localStorage.getItem("draft")||"null");

let openGroups={};
let dragIndex=null;

/* 画面切替 */
function show(p){
 list.classList.add("hidden");
 detail.classList.add("hidden");
 add.classList.add("hidden");
 shoppingDiv=document.getElementById("shopping");
 shoppingDiv.classList.add("hidden");

 search.style.display = (p==="list")?"block":"none";

 if(p==="list") list.classList.remove("hidden");
 if(p==="add"){ add.classList.remove("hidden"); loadDraft(); }
 if(p==="shopping"){ shoppingDiv.classList.remove("hidden"); renderShopping(); }
}

/* 一覧 */
function renderList(){
 list.innerHTML="";
 let key=search.value.toLowerCase();

 let groups={};
 recipes.forEach((r,i)=>{
  if(!groups[r.group]) groups[r.group]=[];
  groups[r.group].push({r,i});
 });

 for(let g in groups){
  let title=document.createElement("div");
  title.className="groupTitle";
  title.textContent=g;
  title.onclick=()=>{
   openGroups[g]=!openGroups[g];
   renderList();
  };
  list.appendChild(title);

  if(!openGroups[g]) continue;

  let wrap=document.createElement("div");
  wrap.className="grid";

  groups[g].forEach(obj=>{
   let r=obj.r;

   let hit=r.title.toLowerCase().includes(key);
   r.ingredients.forEach(gr=>{
    gr.items.forEach(it=>{
     if(it.name.toLowerCase().includes(key)) hit=true;
    });
   });

   if(!hit) return;

   let div=document.createElement("div");
   div.className="card";
   div.innerHTML=`
    <img src="${r.image||''}" onclick="detailView(${obj.i})">
    <div>${r.title}</div>
   `;
   wrap.appendChild(div);
  });

  list.appendChild(wrap);
 }
}

/* 詳細 */
function detailView(i){
 let r=recipes[i];
 detail.classList.remove("hidden");
 list.classList.add("hidden");

 let html=`<h2>${r.title}</h2>`;
 if(r.image) html+=`<img src="${r.image}">`;

 r.ingredients.forEach(g=>{
  html+=`<h3>${g.name}</h3>`;
  g.items.forEach(it=>{
   html+=`
   <label>
    <input type="checkbox" data-name="${it.name}" data-amount="${it.amount}">
    ${it.name} (${it.amount})
   </label><br>`;
  });
 });

 html+=`<button onclick="addShopping()">買い物リストへ追加</button>`;
 html+=`<button onclick="editRecipe(${i})">編集</button>`;
 html+=`<button onclick="deleteRecipe(${i})">削除</button>`;
 html+=`<button onclick="show('list')">戻る</button>`;

 detail.innerHTML=html;
}

/* 分量計算 */
function parseAmount(str){
 let num=parseFloat(str);
 let unit=str.replace(num,"");
 return {num,unit};
}

function addShopping(){
 document.querySelectorAll("#detail input:checked").forEach(c=>{
  let name=c.dataset.name;
  let amount=c.dataset.amount;

  let f=shopping.find(s=>s.name===name);
  if(f){
   let a=parseAmount(f.amount);
   let b=parseAmount(amount);
   if(a.unit===b.unit) f.amount=(a.num+b.num)+a.unit;
   else f.amount+=" + "+amount;
  }else{
   shopping.push({name,amount,checked:false});
  }
 });

 localStorage.setItem("shopping",JSON.stringify(shopping));
 alert("買い物リストへ追加しました");
}

/* タッチドラッグ */
function renderShopping(){
 shopList.innerHTML="";

 shopping.sort((a,b)=>a.checked-b.checked);

 shopping.forEach((s,i)=>{
  let li=document.createElement("li");
  li.className=s.checked?"gray":"";

  li.innerHTML=`
  <input type="checkbox" ${s.checked?"checked":""} onchange="toggle(${i})">
  ${s.name} (${s.amount})
  `;

  li.ontouchstart=e=>{
   dragIndex=i;
   li.classList.add("dragging");
  };

  li.ontouchmove=e=>{
   e.preventDefault();
   let touch=e.touches[0];
   let elem=document.elementFromPoint(touch.clientX,touch.clientY);
   if(!elem || !elem.closest("li")) return;

   let target=[...shopList.children].indexOf(elem.closest("li"));
   if(target!==dragIndex){
    let temp=shopping[dragIndex];
    shopping.splice(dragIndex,1);
    shopping.splice(target,0,temp);
    dragIndex=target;
    renderShopping();
   }
  };

  li.ontouchend=()=>{
   li.classList.remove("dragging");
  };

  shopList.appendChild(li);
 });
}

function toggle(i){
 shopping[i].checked=!shopping[i].checked;
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

function clearShopping(){
 shopping=[];
 localStorage.setItem("shopping",JSON.stringify(shopping));
 renderShopping();
}

/* 登録 */
function saveRecipe(){
 let file=imageFile.files[0];

 function finish(img){
  let ing=[];
  ingredientsArea.childNodes.forEach(g=>{
   let name=g.children[0].value;
   let items=[];
   g.querySelectorAll(".items div").forEach(d=>{
    let i=d.querySelectorAll("input");
    items.push({name:i[0].value,amount:i[1].value});
   });
   ing.push({name,items});
  });

  let steps=[];
  stepsArea.querySelectorAll("textarea").forEach((t,i)=>{
   steps.push((i+1)+". "+t.value);
  });

  recipes.push({group:group.value,title:title.value,image:img,ingredients:ing,steps});
  localStorage.setItem("recipes",JSON.stringify(recipes));

  localStorage.removeItem("draft");
  clearForm();
  show("list");
  renderList();
 }

 if(file){
  let r=new FileReader();
  r.onload=e=>finish(e.target.result);
  r.readAsDataURL(file);
 }else finish(null);
}

/* 編集削除 */
function editRecipe(i){
 let r=recipes[i];
 show("add");
 group.value=r.group;
 title.value=r.title;
}

function deleteRecipe(i){
 if(confirm("削除する？")){
  recipes.splice(i,1);
  localStorage.setItem("recipes",JSON.stringify(recipes));
  renderList();
  show("list");
 }
}

/* 入力 */
function addGroup(){
 let div=document.createElement("div");
 div.innerHTML=`
 <input placeholder="グループ名">
 <button onclick="this.parentNode.remove()">削除</button>
 <div class="items"></div>
 <button onclick="addItem(this)">材料追加</button>
 `;
 ingredientsArea.appendChild(div);
}

function addItem(btn){
 let d=btn.previousElementSibling;
 let row=document.createElement("div");
 row.innerHTML=`
 <input placeholder="材料">
 <input placeholder="分量">
 <button onclick="this.parentNode.remove()">削除</button>
 `;
 d.appendChild(row);
}

function addStep(){
 let d=document.createElement("div");
 d.innerHTML=`
 <textarea></textarea>
 <button onclick="this.parentNode.remove()">削除</button>
 `;
 stepsArea.appendChild(d);
}

/* 下書き */
setInterval(()=>{
 localStorage.setItem("draft",JSON.stringify({
  group:group.value,
  title:title.value
 }));
},2000);

function loadDraft(){
 if(!draft) return;
 group.value=draft.group||"";
 title.value=draft.title||"";
}

function clearForm(){
 group.value="";
 title.value="";
 ingredientsArea.innerHTML="";
 stepsArea.innerHTML="";
}

renderList();
</script>

</body>
</html>
