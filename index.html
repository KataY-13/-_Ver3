<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ</title>

<style>
/* 既存のスタイルを維持 */
body { margin:0; font-family:sans-serif; background:#f2f2f7; overflow: hidden; height: 100vh; }
.container { height: 100%; display: flex; flex-direction: column; }

/* スライド構造 */
.main-viewport { flex: 1; overflow: hidden; position: relative; }
.main-wrapper { display: flex; width: 400%; height: 100%; transition: transform 0.3s ease-out; 
touch-action: pan-y; 
}

.page { width: 25%; height: 100%; overflow-y: auto; padding: 10px 10px 110px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }

/* 詳細画面：visibilityを追加してボタンの反応を確保 */
#detail {
  position: fixed; top: 0; left: 0; width: 100%; height: calc(100% - 90px);
  background: #f2f2f7; z-index: 1000; overflow-y: auto;
  transition: transform 0.3s ease-out; transform: translateX(100%);
  padding: 10px 10px 110px; box-sizing: border-box;
  pointer-events: none;
  visibility: hidden; /* 修正：閉じているときは存在自体を「消す」ことで下のボタンを通す */
}
#detail.open {
  transform: translateX(0%);
  pointer-events: auto;
  visibility: visible; /* 修正：開いたときだけ見える・触れるようにする */
}

.tabbar {
 position:fixed; bottom:0; width:100%; display:flex; background:#fff; border-top:1px solid #ccc; z-index: 2000; height: 90px;
}
.tabbar button { flex:1; padding:0; font-size:18px; background: none; border: none; color: #999; }
.tabbar button.active { color: #007aff; font-weight: bold; }

/* パーツデザイン */
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.card { background:#fff; border-radius:12px; overflow:hidden; font-size:11px; position: relative; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.card img { width:100%; height:80px; object-fit:cover; }
.card div { text-align:center; }
.groupTitle { background:#e5e5ea; padding:10px; margin-top:10px; font-weight:bold; border-radius:8px; }
.detail-img { width:60%; max-width:250px; display:block; margin:10px auto; border-radius:10px; }
#add input, #add textarea { font-size:16px; padding:12px; min-height:22px; width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:10px; }
.row { display:flex; gap:5px; margin-top:5px; }
.row input:nth-child(1){ flex:4; }
.row input:nth-child(2){ flex:3; }
.delBtn { width:1.2em; min-width:28px; height:44px; font-size:14px; background:#ff3b30; color:#fff; border:none; border-radius:10px; }
.groupBox { background:#fff; padding:8px; margin:8px 0; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.stepBox { display:flex; gap:5px; align-items:center; margin:5px 0; }
.stepNumber { width:25px; text-align:right; }
.stepBox textarea { flex:1; min-height:80px; }
li { list-style:none; background:#fff; margin:6px 0; padding:10px; border-radius:12px; display:flex; align-items:center; gap:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.gray { color:#aaa; text-decoration:line-through; }
.topbar { display:flex; justify-content:space-between; gap:8px; align-items:center; }
button:not(.tabbar button) { min-height:44px; font-size:16px; padding:10px 12px; border:none; border-radius:10px; background:#e5f0ff; color:#007aff; }
button:not(.tabbar button) + button { margin-top:8px; }
button:active { opacity:0.7; }
input[type="checkbox"] { transform:scale(1.3); }
#toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:12px 20px; border-radius:20px; font-size:14px; opacity:0; transition:opacity 0.3s, bottom 0.3s; pointer-events:none; z-index: 3000; }
#toast.show { opacity:1; bottom:100px; }
.linkBtn { display:block; text-align:center; margin:10px 0; padding:12px; border-radius:10px; background:#e5f0ff; color:#007aff; text-decoration:none; font-size:16px; }
.fav-star { position: absolute; top: 5px; right: 5px; font-size: 24px; color: #ccc; cursor: pointer; text-shadow: 0 0 3px #fff; z-index: 10; }
.fav-star.active { color: #ffcc00; }
.filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
.filter-btn { flex: 1; max-width: 150px; }
.filter-btn.active { background: #007aff !important; color: #fff !important; }
</style>
</head>

<body>

<div class="container">
  <div class="main-viewport" id="viewport">
    <div class="main-wrapper" id="mainWrapper">
      <div class="page" id="page-list">
        <div id="version" style="font-size:12px; color:#aaa; text-align:right; margin-bottom:4px;">v1.19test</div>
        <div class="topbar" id="listBar">
          <input id="search" placeholder="検索" oninput="renderList()" style="flex:1;">
          <button onclick="exportData()">バックアップ</button>
          <label style="padding:10px 12px; background:#e5f0ff; border-radius:10px; color:#007aff;">復元
            <input type="file" onchange="importData(this.files[0])" style="display:none;">
          </label>
        </div>
        <div id="filterArea" class="filter-bar" style="margin-top:10px;">
          <button id="btnAll" class="filter-btn active" onclick="setFilter('all')">すべて</button>
          <button id="btnFav" class="filter-btn" onclick="setFilter('fav')">お気に入り★</button>
        </div>
        <div id="list"></div>
      </div>

      <div class="page" id="page-add">
        <div class="topbar"><h3>レシピ登録</h3><div style="display:flex; gap:6px;"><button onclick="saveRecipe()">保存</button><button onclick="clearForm()">クリア</button></div></div>
        <input id="sourceUrl" placeholder="ソース元URL" style="margin-top:8px;">
        <input id="title" placeholder="タイトル" style="margin-top:8px;">
        <input type="file" id="imageFile" style="margin-top:8px;">
        <input id="group" placeholder="主菜など" style="margin-top:8px;">
        <h4>材料</h4><div id="ingredientsArea"></div><button onclick="addGroup()">材料グループ追加</button>
        <h4>作り方</h4><div id="stepsArea"></div><button onclick="addStep()">工程追加</button>
      </div>

      <div class="page" id="page-shopping">
        <div class="topbar"><h3>買い物リスト</h3><button onclick="clearShopping()">クリア</button></div>
        <div class="row"><input id="manualItem" placeholder="材料"><input id="manualAmount" placeholder="分量"></div>
        <button onclick="addManual()" style="width:100%; margin-top:8px;">追加</button>
        <ul id="shopList" style="padding:0;"></ul>
      </div>

      <div class="page" id="page-stock">
        <div class="topbar"><h3>在庫リスト</h3></div>
        <div class="row"><input id="stockItem" placeholder="アイテム名"><button onclick="addStock()">追加</button></div>
        <ul id="stockList" style="margin-top:10px; padding:0;"></ul>
      </div>
    </div>
  </div>

  <div id="detail"></div>
</div>

<div class="tabbar">
  <button id="tab0" onclick="show(0)">一覧</button>
  <button id="tab1" onclick="show(1)">登録</button>
  <button id="tab2" onclick="show(2)">買い物</button>
  <button id="tab3" onclick="show(3)">在庫</button>
</div>

<div id="toast"></div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");
let stock = JSON.parse(localStorage.getItem("stockItems")||"[]");

let editIndex=null, formImage = null, openGroups={}, currentFilter = 'all', currentPage = 0;

/* --- スワイプ・スライド管理 --- */
const wrapper = document.getElementById('mainWrapper');
const detailEl = document.getElementById('detail');
let startX = 0, startY = 0, moveX = 0, isScrolling = false, isHorizontal = false;

function show(idx) {
  if (detailEl.classList.contains('open')) closeDetail();
  currentPage = idx;
  updateUI();
}

function updateUI() {
  wrapper.style.transform = `translateX(${-currentPage * 25}%)`;
  document.querySelectorAll('.tabbar button').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentPage);
  });
  if(currentPage === 0) renderList();
  if(currentPage === 2) renderShopping();
  if(currentPage === 3) renderStock();
}

wrapper.ontouchstart = e => { startX = e.touches[0].pageX; startY = e.touches[0].pageY; moveX = 0; isScrolling = false; isHorizontal = false; wrapper.style.transition = 'none'; };
wrapper.ontouchmove = e => {
  let dx = e.touches[0].pageX - startX;
  let dy = e.touches[0].pageY - startY;
  if (!isScrolling && !isHorizontal) {
    if (Math.abs(dy) > Math.abs(dx)) { isScrolling = true; }
    else if (Math.abs(dx) > 15) { isHorizontal = true; } // 判定を少し厳格化
  }
  if (isHorizontal) {
    if (e.cancelable) e.preventDefault(); // スワイプ確定時のみキャンセル
    moveX = dx;
    let offset = -currentPage * (window.innerWidth) + (moveX * 1.1);
    wrapper.style.transform = `translateX(${offset}px)`;
  }
};
wrapper.ontouchend = () => {
  wrapper.style.transition = 'transform 0.3s ease-out';
  if (isHorizontal && Math.abs(moveX) > 50) {
    if (moveX > 0 && currentPage > 0) currentPage--;
    else if (moveX < 0 && currentPage < 3) currentPage++;
  }
  updateUI();
};

detailEl.ontouchstart = e => { startX = e.touches[0].pageX; moveX = 0; isHorizontal = false; detailEl.style.transition = 'none'; };
detailEl.ontouchmove = e => {
  let dx = e.touches[0].pageX - startX;
  if (!isHorizontal && dx > 20) isHorizontal = true;
  if (isHorizontal && dx > 0) { if (e.cancelable) e.preventDefault(); moveX = dx; detailEl.style.transform = `translateX(${moveX * 1.1}px)`; }
};
detailEl.ontouchend = () => {
  detailEl.style.transition = 'transform 0.3s ease-out';
  if (moveX > 100) closeDetail();
  else detailEl.style.transform = "translateX(0%)";
};

function closeDetail() { 
  detailEl.classList.remove('open');
  detailEl.style.transform = "translateX(100%)"; 
}

/* --- レシピロジック --- */
function renderList(){
  const list = document.getElementById("list");
  list.innerHTML="";
  let key = toKatakana(document.getElementById("search").value.toLowerCase());
  let groups={};
  recipes.forEach((r,i)=>{
    let hit = toKatakana(r.title.toLowerCase()).includes(key);
    if(currentFilter === 'fav' && !r.favorite) hit = false;
    if(!hit) return;
    let g = (r.group || "").trim() || "未分類";
    if(!groups[g]) groups[g]=[];
    groups[g].push({r,i});
  });
  Object.keys(groups).sort().forEach(g=>{
    if(openGroups[g] === undefined) openGroups[g] = true;
    let box = document.createElement("div");
    box.innerHTML = `<div class="groupTitle" onclick="openGroups['${g}']=!openGroups['${g}']; renderList();">${g}</div>`;
    if(openGroups[g]){
      let wrap=document.createElement("div"); wrap.className="grid";
      groups[g].forEach(obj=>{
        let div=document.createElement("div"); div.className="card";
        div.innerHTML = `<div class="fav-star ${obj.r.favorite ? 'active' : ''}" onclick="toggleFavorite(event, ${obj.i})">★</div><img src="${obj.r.image||''}"><div>${obj.r.title}</div>`;
        div.onclick=()=>detailView(obj.i);
        wrap.appendChild(div);
      });
      box.appendChild(wrap);
    }
    list.appendChild(box);
  });
}

function detailView(i){
  let r=recipes[i];
  let html = `<div class="topbar"><div style="flex:1; text-align:center; font-weight:bold;">${r.title}</div></div>`;
  if(r.sourceUrl) html += `<a href="${r.sourceUrl}" target="_blank" class="linkBtn">レシピ元を見る</a>`;
  if(r.image) html+=`<img src="${r.image}" class="detail-img">`;
  r.ingredients.forEach(g=>{
    html+=`<h3>${g.name}</h3>`;
    g.items.forEach(it=>{ html+=`<label><input type="checkbox" data-name="${it.name}" data-amount="${it.amount}">${it.name} (${it.amount})</label><br>`; });
  });
  html+=`<h3>作り方</h3>`;
  r.steps.forEach(s=> html+=s+"<br>");
  html+=`<button onclick="addShopping()">買い物リストへ追加</button><button onclick="editRecipe(${i})">編集</button><button onclick="deleteRecipe(${i})">削除</button>`;
  detailEl.innerHTML=html;
  detailEl.classList.add('open');
  detailEl.style.transform = "translateX(0%)";
}

function setFilter(mode) { currentFilter = mode; document.getElementById("btnAll").classList.toggle("active", mode === 'all'); document.getElementById("btnFav").classList.toggle("active", mode === 'fav'); renderList(); }
function toggleFavorite(e, index) { e.stopPropagation(); recipes[index].favorite = !recipes[index].favorite; localStorage.setItem("recipes", JSON.stringify(recipes)); renderList(); }

document.getElementById("imageFile").addEventListener("change", function(e){
  const file = e.target.files[0]; if(!file) { formImage = null; return; }
  const reader = new FileReader();
  reader.onload = function(evt){
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas'); const MAX_WIDTH = 500; const scaleSize = MAX_WIDTH / img.width;
      canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      formImage = canvas.toDataURL('image/jpeg', 0.7);
    }; img.src = evt.target.result;
  }; reader.readAsDataURL(file);
});

function addShopping(){
  let count=0; document.querySelectorAll("#detail input:checked").forEach(c=>{ shopping.push({name:c.dataset.name,amount:c.dataset.amount,checked:false}); count++; });
  localStorage.setItem("shopping",JSON.stringify(shopping)); renderShopping();
  if(count>0) showToast("買い物リストに追加しました");
}
function addManual(){ shopping.push({name:manualItem.value,amount:manualAmount.value,checked:false}); manualItem.value=""; manualAmount.value=""; localStorage.setItem("shopping",JSON.stringify(shopping)); renderShopping(); }
function renderShopping(){ const shopList = document.getElementById("shopList"); shopList.innerHTML=""; shopping.sort((a,b)=>a.checked - b.checked).forEach((s,i)=>{ let li=document.createElement("li"); li.className=s.checked?"gray":""; li.innerHTML=`<input type="checkbox" ${s.checked?"checked":""} onchange="shopping[${i}].checked=!shopping[${i}].checked; localStorage.setItem('shopping',JSON.stringify(shopping)); renderShopping();">${s.name} (${s.amount})<button onclick="shopping.splice(${i},1); localStorage.setItem('shopping',JSON.stringify(shopping)); renderShopping();" style="margin-left:auto;">×</button>`; shopList.appendChild(li); }); }
function clearShopping(){ if(confirm("クリアしますか？")){ shopping=[]; localStorage.setItem("shopping","[]"); renderShopping(); } }
function addStock(){ if(!stockItem.value) return; stock.push(stockItem.value); stockItem.value=""; localStorage.setItem("stockItems", JSON.stringify(stock)); renderStock(); }
function renderStock(){ const sl = document.getElementById("stockList"); sl.innerHTML = ""; stock.forEach((item, i) => { let li = document.createElement("li"); li.innerHTML = `<span>${item}</span><button onclick="stock.splice(${i},1); localStorage.setItem('stockItems',JSON.stringify(stock)); renderStock();" style="margin-left:auto;">×</button>`; sl.appendChild(li); }); }

function saveRecipe(){
  let ing=[]; document.querySelectorAll(".groupBox").forEach(g=>{
    let items=[]; g.querySelectorAll(".row").forEach(d=>{ let i=d.querySelectorAll("input"); items.push({name:i[0].value,amount:i[1].value}); });
    ing.push({name:g.querySelector("input").value,items});
  });
  let steps=[]; document.querySelectorAll(".stepBox textarea").forEach((t,i)=>{ steps.push((i+1)+". "+t.value); });
  let data={ group: group.value, title: title.value, image: formImage, sourceUrl: sourceUrl.value, ingredients: ing, steps, favorite: editIndex !== null ? recipes[editIndex].favorite : false };
  if(editIndex !== null) recipes[editIndex] = data; else recipes.push(data);
  localStorage.setItem("recipes", JSON.stringify(recipes)); clearForm(); show(0); showToast("保存しました");
}

function editRecipe(i){
  let r=recipes[i]; editIndex=i; formImage = r.image; closeDetail(); show(1);
  title.value=r.title; group.value=r.group; sourceUrl.value = r.sourceUrl || "";
  ingredientsArea.innerHTML=""; r.ingredients.forEach(g=>{ addGroup(); let gBox = ingredientsArea.lastChild; gBox.querySelector("input").value = g.name; let itemsDiv = gBox.querySelector(".items"); itemsDiv.innerHTML=""; g.items.forEach(it=>{ addItem(itemsDiv); let row = itemsDiv.lastChild; let inputs = row.querySelectorAll("input"); inputs[0].value = it.name; inputs[1].value = it.amount; }); });
  stepsArea.innerHTML=""; r.steps.forEach(s=>{ addStep(); stepsArea.lastChild.querySelector("textarea").value = s.replace(/^\d+\.\s*/, ""); });
  updateStepNumbers();
}

function deleteRecipe(i){ if(!confirm("削除しますか？")) return; recipes.splice(i,1); localStorage.setItem("recipes",JSON.stringify(recipes)); closeDetail(); show(0); renderList(); }
function addGroup(){ let div=document.createElement("div"); div.className="groupBox"; div.innerHTML=`<div style="display:flex; align-items:center; gap:5px;"><input placeholder="グループ名" style="flex:1;"><button class="delBtn" onclick="this.closest('.groupBox').remove()">×</button></div><div class="items"></div><button onclick="addItem(this)">材料追加</button>`; ingredientsArea.appendChild(div); addItem(div.querySelector(".items")); }
function addItem(container){ if(container.tagName === "BUTTON") container = container.previousElementSibling; let row=document.createElement("div"); row.className="row"; row.innerHTML=`<input placeholder="材料"><input placeholder="分量"><button class="delBtn" onclick="this.parentNode.remove()">×</button>`; container.appendChild(row); }
function addStep(){ let div=document.createElement("div"); div.className="stepBox"; div.innerHTML=`<div class="stepNumber"></div><textarea></textarea><button class="delBtn" onclick="this.parentNode.remove();updateStepNumbers()">×</button>`; stepsArea.appendChild(div); updateStepNumbers(); }
function updateStepNumbers(){ document.querySelectorAll(".stepBox").forEach((s,i)=>{ s.querySelector(".stepNumber").textContent=(i+1)+"."; }); }
function clearForm(){ sourceUrl.value=""; title.value=""; group.value=""; imageFile.value=""; ingredientsArea.innerHTML=""; stepsArea.innerHTML=""; editIndex=null; formImage = null; }
function showToast(msg){ let t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>{ t.classList.remove("show"); },1500); }
function toKatakana(str){ return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60)); }
function exportData(){ let data = localStorage.getItem("recipes") || "[]"; let blob = new Blob([data], {type:"application/json"}); let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "recipes_backup.json"; a.click(); }
function importData(file){ if(!file) return; let reader = new FileReader(); reader.onload = e => { localStorage.setItem("recipes", e.target.result); recipes = JSON.parse(e.target.result); renderList(); showToast("復元しました"); }; reader.readAsText(file); }

show(0);
</script>
</body>
</html>
