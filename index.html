<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ v2.0</title>

<style>
body { margin:0; font-family:sans-serif; background:#f2f2f7; }
.container { padding:10px 10px 110px; }

/* タブバー */
.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
 z-index: 100;
}
.tabbar button {
 flex:1;
 padding:25px;
 font-size:18px;
 border:none;
 background:none;
}

/* カード・グリッド */
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.card { 
  background:#fff; border-radius:12px; overflow:hidden; font-size:11px; 
  box-shadow:0 2px 6px rgba(0,0,0,0.08); position: relative;
}
.card img { width:100%; height:80px; object-fit:cover; }
.card div { text-align:center; padding:2px; }

/* 星マーク */
.fav-star {
  position: absolute; top: 4px; right: 4px; font-size: 26px; cursor: pointer; z-index: 10;
  color: #000;
}
.fav-star.active {
  color: #ffcc00;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
}

/* カード右下の情報バッジ */
.badge {
  position: absolute; bottom: 20px; right: 2px;
  background: rgba(255,255,255,0.8); padding: 1px 4px; border-radius: 4px; font-size: 9px;
}

/* フィルタエリア */
.filter-bar { display:flex; gap:8px; margin:10px 0; }
.filter-btn {
  flex:1; padding:8px; border-radius:10px; border:1px solid #ddd; background:#fff; font-size:12px;
}
.filter-btn.active { background:#007aff !important; color:#fff !important; border:none; }

/* ソートエリア */
.sort-area { display:flex; gap:5px; margin-bottom:10px; overflow-x:auto; padding-bottom:5px; }
.sort-btn { white-space:nowrap; font-size:11px; padding:5px 10px; border-radius:15px; border:1px solid #ccc; background:#eee; }
.sort-btn.active { background:#555; color:#fff; }

/* 単位チップ */
#unitChips {
  position: fixed; bottom: 0; left: 0; width: 100%; background: #ddd;
  display: none; flex-wrap: wrap; gap: 5px; padding: 10px; z-index: 200;
}
.chip { background: #fff; padding: 8px 12px; border-radius: 20px; font-size: 14px; }

/* 上下移動ボタン */
.scroll-btn {
  position: fixed; right: 15px; width: 44px; height: 44px;
  background: rgba(0,122,255,0.8); color: #fff; border-radius: 50%;
  display: none; align-items: center; justify-content: center; z-index: 90; font-size: 20px;
}
#scrollTop { top: 70px; }
#scrollBottom { bottom: 100px; }

/* 既存スタイル継承 */
.groupTitle { background:#e5e5ea; padding:10px; margin-top:10px; font-weight:bold; border-radius:8px; }
.detail-img { width:60%; max-width:250px; display:block; margin:10px auto; border-radius:10px; }
#add input, #add textarea { font-size:16px; padding:12px; width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:10px; margin-bottom:5px;}
.row { display:flex; gap:5px; margin-top:5px; }
.delBtn { background:#ff3b30; color:#fff; border:none; border-radius:8px; padding:0 10px; }
.groupBox { background:#fff; padding:8px; margin:8px 0; border-radius:8px; }
.hidden { display:none; }
.topbar { display:flex; justify-content:space-between; gap:8px; align-items:center; }
button:not(.tabbar button, .chip, .sort-btn) { 
  min-height:44px; font-size:16px; padding:10px; border:none; border-radius:10px; background:#e5f0ff; color:#007aff;
}
#toast {
 position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
 background:rgba(0,0,0,0.8); color:#fff; padding:12px 20px; border-radius:20px;
 font-size:14px; opacity:0; transition:0.3s; pointer-events:none; z-index:300;
}
#toast.show { opacity:1; }
.linkBtn { display:block; text-align:center; margin:10px 0; padding:12px; border-radius:10px; background:#e5f0ff; color:#007aff; text-decoration:none; }
</style>
</head>

<body>

<div class="container">
  <div id="version" style="font-size:12px; color:#aaa; text-align:right;">
    v2.00
  </div>






  

  <div id="listBar" class="topbar">
    <input id="search" placeholder="検索" oninput="renderList()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
    <button onclick="exportData()">バックアップ</button>
    <label style="padding:10px; background:#e5f0ff; border-radius:10px; color:#007aff;">
      復元 <input type="file" onchange="importData(this.files[0])" style="display:none;">
    </label>
  </div>

  <div id="filterArea">
    <div class="filter-bar">
      <button id="btnAll" class="filter-btn active" onclick="setFilter('all')">すべて</button>
      <button id="btnFav" class="filter-btn" onclick="setFilter('fav')">お気に入り★</button>
    </div>
    <div class="sort-area">
      <button class="sort-btn active" id="sort-reg" onclick="setSort('reg')">登録順</button>
      <button class="sort-btn" id="sort-count" onclick="setSort('count')">調理回数順</button>
      <button class="sort-btn" id="sort-date" onclick="setSort('date')">最終調理日順</button>
    </div>
  </div>

  <div id="list"></div>
  <div id="detail" class="hidden"></div>

  <div id="add" class="hidden">
    <div class="topbar">
      <h3>レシピ登録</h3>
      <div style="display:flex; gap:6px;">
        <button onclick="saveRecipe()">保存</button>
        <button onclick="clearForm()">クリア</button>
      </div>
    </div>
    <input id="sourceUrl" placeholder="ソース元URL">
    <input id="title" placeholder="タイトル">
    <input type="file" id="imageFile">
    <input id="group" placeholder="主菜など">
    <h4>材料</h4>
    <div id="ingredientsArea"></div>
    <button onclick="addGroup()">材料グループ追加</button>
    <h4>作り方</h4>
    <div id="stepsArea"></div>
    <button onclick="addStep()">工程追加</button>
  </div>

  <div id="shopping" class="hidden">
    <div class="topbar"><h3>買い物リスト</h3><button onclick="clearShopping()">クリア</button></div>
    <input id="manualItem" placeholder="材料" style="width:40%; padding:10px;">
    <input id="manualAmount" placeholder="分量" style="width:30%; padding:10px;">
    <button onclick="addManual()">追加</button>
    <ul id="shopList" style="padding:0;"></ul>
  </div>
</div>

<div id="scrollTop" class="scroll-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</div>
<div id="scrollBottom" class="scroll-btn" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">▼</div>

<div id="unitChips"></div>

<div class="tabbar">
  <button onclick="show('list')">一覧</button>
  <button onclick="show('add')">登録</button>
  <button onclick="show('shopping')">買い物</button>
</div>

<div id="toast"></div>

<script>
let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");
let shopping = JSON.parse(localStorage.getItem("shopping")||"[]");
let editIndex = null;
let formImage = null;
let openGroups = {};
let currentFilter = 'all';
let currentSort = 'reg';
let activeAmountInput = null;

const units = ["大さじ", "小さじ", "g", "ml", "cm", "個", "本", "枚", "パック", "袋", "適量", "合", "片分"];

/* --- 画面制御 --- */
function show(p){
  const ids = ["list", "detail", "add", "shopping", "filterArea"];
  ids.forEach(id => document.getElementById(id).classList.add("hidden"));
  document.getElementById("listBar").style.display = (p==="list") ? "flex" : "none";
  
  if(p==="list") {
    document.getElementById("list").classList.remove("hidden");
    document.getElementById("filterArea").classList.remove("hidden");
    renderList();
  } else {
    document.getElementById(p).classList.remove("hidden");
  }
  if(p==="shopping") renderShopping();
  window.scrollTo(0,0);
}

/* --- スクロールボタン制御 --- */
window.onscroll = function() {
  let top = document.getElementById("scrollTop");
  let bot = document.getElementById("scrollBottom");
  if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
    top.style.display = "flex";
    bot.style.display = "flex";
  } else {
    top.style.display = "none";
    bot.style.display = "none";
  }
};

/* --- 画像圧縮処理 --- */
document.getElementById("imageFile").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 500;
      const scaleSize = MAX_WIDTH / img.width;
      canvas.width = MAX_WIDTH;
      canvas.height = img.height * scaleSize;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      formImage = canvas.toDataURL('image/jpeg', 0.7);
    };
    img.src = evt.target.result;
  };
  reader.readAsDataURL(file);
});

/* --- 一覧描画 --- */
function setFilter(m){ currentFilter=m; show('list'); }
function setSort(s){ 
  currentSort=s; 
  document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("sort-"+s).classList.add("active");
  renderList(); 
}

function renderList(){
  const listDiv = document.getElementById("list");
  listDiv.innerHTML = "";
  let key = toKatakana(document.getElementById("search").value.toLowerCase());
  let groups = {};

  recipes.forEach((r, i) => {
    let hit = toKatakana(r.title.toLowerCase()).includes(key);
    if(currentFilter === 'fav' && !r.favorite) hit = false;
    if(!hit) return;

    let g = (r.group || "").trim() || "未分類";
    if(!groups[g]) groups[g] = [];
    groups[g].push({r, i});
  });

  Object.keys(groups).sort().forEach(gName => {
    if(openGroups[gName] === undefined) openGroups[gName] = true;
    
    // グループ内ソート
    groups[gName].sort((a, b) => {
      if(currentSort === 'count') return (b.r.count || 0) - (a.r.count || 0);
      if(currentSort === 'date') {
        let da = a.r.lastDate || "00/00/00";
        let db = b.r.lastDate || "00/00/00";
        return db.localeCompare(da);
      }
      return 0; // 登録順はそのまま
    });

    let box = document.createElement("div");
    let title = document.createElement("div");
    title.className = "groupTitle";
    title.textContent = gName;
    title.onclick = () => { openGroups[gName] = !openGroups[gName]; renderList(); };
    box.appendChild(title);

    if(openGroups[gName]){
      let wrap = document.createElement("div");
      wrap.className = "grid";
      groups[gName].forEach(obj => {
        let r = obj.r;
        let info = (currentSort === 'date') ? (r.lastDate || "--") : `×${r.count || 0}`;
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div class="fav-star ${r.favorite?'active':''}" onclick="toggleFavorite(event, ${obj.i})">★</div>
          <img src="${r.image || ''}">
          <div class="badge">${info}</div>
          <div>${r.title}</div>
        `;
        div.onclick = () => detailView(obj.i);
        wrap.appendChild(div);
      });
      box.appendChild(wrap);
    }
    listDiv.appendChild(box);
  });
}

/* --- 詳細画面 --- */
function detailView(i){
  let r = recipes[i];
  const detailDiv = document.getElementById("detail");
  detailDiv.classList.remove("hidden");
  document.getElementById("list").classList.add("hidden");
  document.getElementById("filterArea").classList.add("hidden");

  let html = `
    <button onclick="show('list')">← 戻る</button>
    <h2 style="text-align:center;">${r.title}</h2>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <button style="flex:1;" onclick="toggleFavorite(null, ${i})">${r.favorite?'★ 解除':'☆ お気に入り'}</button>
      <button style="flex:1; background:#34c759; color:#fff;" onclick="cookToday(${i})">今日作った！</button>
    </div>
    <div style="font-size:12px; color:#666; text-align:center; margin-bottom:10px;">
      調理回数: ${r.count||0}回 / 最終調理日: ${r.lastDate||'なし'}
    </div>
  `;

  if(r.sourceUrl) html += `<a href="${r.sourceUrl}" target="_blank" class="linkBtn">レシピ元を見る</a>`;
  if(r.image) html += `<img src="${r.image}" class="detail-img">`;

  r.ingredients.forEach(g => {
    html += `<h3>${g.name}</h3>`;
    g.items.forEach(it => {
      html += `<label style="display:block; padding:5px 0;"><input type="checkbox" data-name="${it.name}" data-amount="${it.amount}"> ${it.name} (${it.amount})</label>`;
    });
  });

  html += `<h3>作り方</h3>`;
  r.steps.forEach(s => html += `<p style="border-bottom:1px solid #eee; padding-bottom:5px;">${s}</p>`);

  html += `
    <button style="width:100%; margin-top:10px;" onclick="addShopping()">買い物リストへ追加</button>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button style="flex:1;" onclick="editRecipe(${i})">編集</button>
      <button style="flex:1; background:#ff3b30; color:#fff;" onclick="deleteRecipe(${i})">削除</button>
    </div>
  `;
  detailDiv.innerHTML = html;
}

/* --- 調理記録 --- */
function cookToday(i){
  let d = new Date();
  let dateStr = `${d.getFullYear().toString().slice(-2)}/${d.getMonth()+1}/${d.getDate()}`;
  recipes[i].count = (recipes[i].count || 0) + 1;
  recipes[i].lastDate = dateStr;
  localStorage.setItem("recipes", JSON.stringify(recipes));
  detailView(i);
  showToast("調理を記録しました！");
}

function toggleFavorite(e, i){
  if(e) e.stopPropagation();
  recipes[i].favorite = !recipes[i].favorite;
  localStorage.setItem("recipes", JSON.stringify(recipes));
  if(!document.getElementById("detail").classList.contains("hidden")) detailView(i);
  else renderList();
}

/* --- 単位チップ --- */
function setupChips() {
  const area = document.getElementById("unitChips");
  area.innerHTML = "";
  units.forEach(u => {
    let span = document.createElement("span");
    span.className = "chip";
    span.textContent = u;
    span.onmousedown = (e) => { // clickだとfocusが外れるのでmousedown
      e.preventDefault();
      if(activeAmountInput) {
        activeAmountInput.value += u;
        // 入力後にフォーカスを外さない
      }
    };
    area.appendChild(span);
  });
}

function showChips(input) {
  activeAmountInput = input;
  document.getElementById("unitChips").style.display = "flex";
}
function hideChips() {
  setTimeout(() => {
    document.getElementById("unitChips").style.display = "none";
    activeAmountInput = null;
  }, 200);
}

/* --- レシピ保存系 --- */
function saveRecipe(){
  let ing = [];
  document.querySelectorAll("#ingredientsArea .groupBox").forEach(g => {
    let items = [];
    g.querySelectorAll(".row").forEach(row => {
      let ins = row.querySelectorAll("input");
      items.push({name: ins[0].value, amount: ins[1].value});
    });
    ing.push({name: g.querySelector("input").value, items});
  });

  let steps = [];
  document.querySelectorAll("#stepsArea textarea").forEach((t, i) => {
    if(t.value.trim()) steps.push((i+1) + ". " + t.value);
  });

  let data = {
    title: document.getElementById("title").value,
    group: document.getElementById("group").value,
    image: formImage,
    sourceUrl: document.getElementById("sourceUrl").value,
    ingredients: ing,
    steps: steps,
    favorite: editIndex !== null ? recipes[editIndex].favorite : false,
    count: editIndex !== null ? recipes[editIndex].count : 0,
    lastDate: editIndex !== null ? recipes[editIndex].lastDate : null
  };

  if(editIndex !== null) recipes[editIndex] = data;
  else recipes.push(data);

  localStorage.setItem("recipes", JSON.stringify(recipes));
  clearForm();
  show("list");
  showToast("保存しました");
}

function editRecipe(i){
  editIndex = i;
  let r = recipes[i];
  formImage = r.image;
  show("add");
  document.getElementById("title").value = r.title;
  document.getElementById("group").value = r.group;
  document.getElementById("sourceUrl").value = r.sourceUrl || "";
  
  document.getElementById("ingredientsArea").innerHTML = "";
  r.ingredients.forEach(g => {
    addGroup();
    let gBox = document.getElementById("ingredientsArea").lastChild;
    gBox.querySelector("input").value = g.name;
    let itemsDiv = gBox.querySelector(".items");
    itemsDiv.innerHTML = "";
    g.items.forEach(it => {
      addItem(itemsDiv);
      let row = itemsDiv.lastChild;
      row.querySelectorAll("input")[0].value = it.name;
      row.querySelectorAll("input")[1].value = it.amount;
    });
  });

  document.getElementById("stepsArea").innerHTML = "";
  r.steps.forEach(s => {
    addStep();
    document.getElementById("stepsArea").lastChild.querySelector("textarea").value = s.replace(/^\d+\.\s*/, "");
  });
}

function deleteRecipe(i){
  if(confirm("削除しますか？")){
    recipes.splice(i,1);
    localStorage.setItem("recipes", JSON.stringify(recipes));
    show("list");
  }
}

/* --- 入力補助 --- */
function addGroup(){
  let div = document.createElement("div");
  div.className = "groupBox";
  div.innerHTML = `
    <div style="display:flex; gap:5px;"><input placeholder="グループ名(材料)" style="flex:1;"><button class="delBtn" onclick="this.closest('.groupBox').remove()">×</button></div>
    <div class="items"></div>
    <button onclick="addItem(this.previousElementSibling)" style="margin-top:5px;">材料追加</button>
  `;
  document.getElementById("ingredientsArea").appendChild(div);
  addItem(div.querySelector(".items"));
}

function addItem(container){
  let row = document.createElement("div");
  row.className = "row";
  row.innerHTML = `
    <input placeholder="材料" style="flex:4;">
    <input placeholder="分量" style="flex:3;" onfocus="showChips(this)" onblur="hideChips()">
    <button class="delBtn" onclick="this.parentNode.remove()">×</button>
  `;
  container.appendChild(row);
}

function addStep(){
  let div = document.createElement("div");
  div.className = "row";
  div.innerHTML = `<textarea style="flex:1; height:60px;"></textarea><button class="delBtn" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById("stepsArea").appendChild(div);
}

function clearForm(){
  document.getElementById("title").value = "";
  document.getElementById("group").value = "";
  document.getElementById("sourceUrl").value = "";
  document.getElementById("imageFile").value = "";
  document.getElementById("ingredientsArea").innerHTML = "";
  document.getElementById("stepsArea").innerHTML = "";
  formImage = null; editIndex = null;
}

/* --- 買い物リスト --- */
function addShopping(){
  document.querySelectorAll("#detail input:checked").forEach(c => {
    shopping.push({name: c.dataset.name, amount: c.dataset.amount, checked: false});
  });
  localStorage.setItem("shopping", JSON.stringify(shopping));
  showToast("買い物リストに追加しました");
}
function addManual(){
  let n = document.getElementById("manualItem");
  let a = document.getElementById("manualAmount");
  if(!n.value) return;
  shopping.push({name: n.value, amount: a.value, checked: false});
  n.value = ""; a.value = "";
  localStorage.setItem("shopping", JSON.stringify(shopping));
  renderShopping();
}
function renderShopping(){
  let list = document.getElementById("shopList");
  list.innerHTML = "";
  shopping.sort((a,b)=>a.checked - b.checked).forEach((s, i) => {
    let li = document.createElement("li");
    li.style = "list-style:none; background:#fff; margin:5px 0; padding:10px; border-radius:10px; display:flex; align-items:center; gap:10px;";
    if(s.checked) li.style.opacity = "0.5";
    li.innerHTML = `
      <input type="checkbox" ${s.checked?'checked':''} onchange="shopping[${i}].checked=!shopping[${i}].checked; localStorage.setItem('shopping', JSON.stringify(shopping)); renderShopping();">
      <span style="flex:1; ${s.checked?'text-decoration:line-through':''}">${s.name} (${s.amount})</span>
      <button onclick="shopping.splice(${i},1); localStorage.setItem('shopping', JSON.stringify(shopping)); renderShopping();" class="delBtn">×</button>
    `;
    list.appendChild(li);
  });
}
function clearShopping(){ shopping = []; localStorage.setItem("shopping", "[]"); renderShopping(); }

/* --- ユーティリティ --- */
function toKatakana(str){ return str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60)); }
function showToast(m){ 
  let t = document.getElementById("toast"); t.textContent = m; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2000);
}
function exportData(){
  let blob = new Blob([localStorage.getItem("recipes")], {type:"application/json"});
  let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "recipes.json"; a.click();
}
function importData(f){
  let r = new FileReader();
  r.onload = e => { localStorage.setItem("recipes", e.target.result); recipes = JSON.parse(e.target.result); renderList(); showToast("復元しました"); };
  r.readAsText(f);
}

// 初期化
setupChips();
show('list');
</script>
</body>
</html>
