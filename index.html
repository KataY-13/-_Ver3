<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レシピアプリ</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.container { padding:10px 10px 110px; }

/* 下タブ */
.tabbar {
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ccc;
}
.tabbar button {
 flex:1;
 padding:25px;
 font-size:18px;
}

/* 一覧 */
.grid {
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:6px;
}
.card {
 background:#fff;
 border-radius:8px;
 overflow:hidden;
 font-size:11px;
}
.card img {
 width:100%;
 height:80px;
 object-fit:cover;
}

.groupTitle {
 background:#ddd;
 padding:10px;
 margin-top:10px;
 font-weight:bold;
}

/* 詳細 */
.detail-img {
 width:60%;
 max-width:250px;
 display:block;
 margin:10px auto;
 border-radius:10px;
}

/* 登録 */
#add input, #add textarea {
 font-size:16px;
 padding:10px;
 margin:6px 0;
 width:100%;
 box-sizing:border-box;
}

#add button {
 font-size:18px;
 padding:10px;
 margin:6px 0;
 width:100%;
}

/* グループ */
.groupBox {
 background:#fff;
 padding:8px;
 margin:8px 0;
 border-radius:8px;
}

.items { margin-top:5px; }

.row {
 display:flex;
 gap:5px;
 margin-top:5px;
}
.row input:nth-child(1){ flex:2; }
.row input:nth-child(2){ flex:1; }

/* 削除ボタン（1文字幅） */
.delBtn {
 width:1.8em;
 min-width:1.8em;
 padding:0;
 font-size:16px;
}

/* 工程 */
.stepBox {
 display:flex;
 align-items:center;
 gap:5px;
 margin:5px 0;
}
.stepNumber {
 width:25px;
 text-align:right;
}
.stepBox textarea {
 flex:1;
}

/* 買い物 */
li {
 list-style:none;
 background:#fff;
 margin:6px 0;
 padding:10px;
 border-radius:8px;
 display:flex;
 align-items:center;
 gap:10px;
}

.gray { color:#aaa; text-decoration:line-through; }
.hidden { display:none; }

.topbar {
 display:flex;
 justify-content:space-between;
 align-items:center;
}
</style>
</head>

<body>

<div class="container">

<input id="search" placeholder="検索" oninput="renderList()">

<div id="list"></div>
<div id="detail" class="hidden"></div>

<!-- 登録 -->
<div id="add" class="hidden">

<h3>レシピ登録</h3>

<input id="title" placeholder="タイトル">
<input type="file" id="imageFile">
<input id="group" placeholder="主菜など">

<h4>材料</h4>
<div id="ingredientsArea"></div>
<button onclick="addGroup()">材料グループ追加</button>

<h4>作り方</h4>
<div id="stepsArea"></div>
<button onclick="addStep()">工程追加</button>

<button onclick="saveRecipe()">保存</button>
<button onclick="clearForm()">クリア</button>

</div>

<!-- 買い物 -->
<div id="shopping" class="hidden">
<div class="topbar">
<h3>買い物リスト</h3>
<button onclick="clearShopping()">クリア</button>
</div>
<ul id="shopList"></ul>
</div>

</div>

<!-- 下タブ -->
<div class="tabbar">
<button onclick="show('list')">一覧</button>
<button onclick="show('add')">登録</button>
<button onclick="show('shopping')">買い物</button>
</div>

<script>
let recipes = [];
let shopping = [];
let openGroups={};

/* 画面切替 */
function show(p){
 list.classList.add("hidden");
 detail.classList.add("hidden");
 add.classList.add("hidden");
 shoppingDiv=document.getElementById("shopping");
 shoppingDiv.classList.add("hidden");

 search.style.display = (p==="list")?"block":"none";

 if(p==="list") list.classList.remove("hidden");
 if(p==="add") add.classList.remove("hidden");
 if(p==="shopping"){ shoppingDiv.classList.remove("hidden"); renderShopping(); }
}

/* 一覧 */
function renderList(){
 list.innerHTML="";
 let key=search.value.toLowerCase();
 let groups={};

 recipes.forEach((r,i)=>{
  let g=r.group && r.group.trim()?r.group.trim():"未分類";
  if(!groups[g]) groups[g]=[];
  groups[g].push({r,i});
 });

 Object.keys(groups).forEach(g=>{
  let title=document.createElement("div");
  title.className="groupTitle";
  title.textContent=g;
  title.onclick=()=>{ openGroups[g]=!openGroups[g]; renderList(); };
  list.appendChild(title);

  if(!openGroups[g]) return;

  let wrap=document.createElement("div");
  wrap.className="grid";

  groups[g].forEach(obj=>{
   let r=obj.r;

   let hit=r.title.toLowerCase().includes(key);
   r.ingredients.forEach(gr=>{
    gr.items.forEach(it=>{
     if(it.name.toLowerCase().includes(key)) hit=true;
    });
   });
   if(!hit) return;

   let div=document.createElement("div");
   div.className="card";
   div.innerHTML=`
    <img src="${r.image||''}">
    <div>${r.title}</div>
   `;
   div.onclick=()=>detailView(obj.i);
   wrap.appendChild(div);
  });

  list.appendChild(wrap);
 });
}

/* 詳細 */
function detailView(i){
 let r=recipes[i];
 detail.classList.remove("hidden");
 list.classList.add("hidden");

 let html=`<h2>${r.title}</h2>`;
 if(r.image) html+=`<img src="${r.image}" class="detail-img">`;

 r.ingredients.forEach(g=>{
  html+=`<h3>${g.name}</h3>`;
  g.items.forEach(it=>{
   html+=`<label><input type="checkbox" data-name="${it.name}" data-amount="${it.amount}">
   ${it.name} (${it.amount})</label><br>`;
  });
 });

 html+=`<h3>作り方</h3>`;
 r.steps.forEach(s=> html+=s+"<br>");

 html+=`<button onclick="addShopping()">買い物リストへ追加</button>`;
 html+=`<button onclick="editRecipe(${i})">編集</button>`;
 html+=`<button onclick="deleteRecipe(${i})">削除</button>`;

 detail.innerHTML=html;
}

/* 買い物 */
function addShopping(){
 document.querySelectorAll("#detail input:checked").forEach(c=>{
  shopping.push({name:c.dataset.name,amount:c.dataset.amount,checked:false});
 });
 renderShopping();
}

function renderShopping(){
 shopList.innerHTML="";
 shopping.sort((a,b)=>a.checked - b.checked);

 shopping.forEach((s,i)=>{
  let li=document.createElement("li");
  li.className=s.checked?"gray":"";

  li.innerHTML=`
   <input type="checkbox" ${s.checked?"checked":""} onchange="toggle(${i})">
   ${s.name} (${s.amount})
  `;
  shopList.appendChild(li);
 });
}

function toggle(i){
 shopping[i].checked=!shopping[i].checked;
 renderShopping();
}

function clearShopping(){
 shopping=[];
 renderShopping();
}

/* 登録 */
function saveRecipe(){
 let file=imageFile.files[0];

 function finish(img){
  let ing=[];
  ingredientsArea.querySelectorAll(".groupBox").forEach(g=>{
   let items=[];
   g.querySelectorAll(".row").forEach(d=>{
    let i=d.querySelectorAll("input");
    items.push({name:i[0].value,amount:i[1].value});
   });
   ing.push({name:g.querySelector("input").value,items});
  });

  let steps=[];
  stepsArea.querySelectorAll("textarea").forEach((t,i)=>{
   steps.push((i+1)+". "+t.value);
  });

  recipes.push({group:group.value,title:title.value,image:img,ingredients:ing,steps});
  clearForm();
  show("list");
  renderList();
 }

 if(file){
  let r=new FileReader();
  r.onload=e=>finish(e.target.result);
  r.readAsDataURL(file);
 }else finish(null);
}

/* 編集削除 */
function editRecipe(i){
 let r=recipes[i];
 show("add");
 title.value=r.title;
 group.value=r.group;
}

function deleteRecipe(i){
 if(confirm("削除する？")){
  recipes.splice(i,1);
  renderList();
 }
}

/* 入力 */
function addGroup(){
 let div=document.createElement("div");
 div.className="groupBox";

 div.innerHTML=`
 <div style="display:flex; gap:5px; align-items:center;">
   <input placeholder="グループ名" style="flex:1;">
   <button class="delBtn" onclick="this.closest('.groupBox').remove()">×</button>
 </div>

 <div class="items"></div>
 <button onclick="addItem(this)">材料追加</button>
 `;

 ingredientsArea.appendChild(div);
 addItem(div.querySelector(".items"));
}

function addItem(container){
 if(container.tagName==="BUTTON") container=container.previousElementSibling;

 let row=document.createElement("div");
 row.className="row";

 row.innerHTML=`
 <input placeholder="材料">
 <input placeholder="分量">
 <button class="delBtn" onclick="this.parentNode.remove()">×</button>
 `;
 container.appendChild(row);
}

function addStep(){
 let div=document.createElement("div");
 div.className="stepBox";

 div.innerHTML=`
 <div class="stepNumber"></div>
 <textarea></textarea>
 <button class="delBtn" onclick="removeStep(this)">×</button>
 `;

 stepsArea.appendChild(div);
 updateStepNumbers();
}

function removeStep(btn){
 btn.parentNode.remove();
 updateStepNumbers();
}

function updateStepNumbers(){
 document.querySelectorAll(".stepBox").forEach((s,i)=>{
  s.querySelector(".stepNumber").textContent=(i+1)+".";
 });
}

function clearForm(){
 title.value="";
 group.value="";
 imageFile.value="";
 ingredientsArea.innerHTML="";
 stepsArea.innerHTML="";
}

renderList();
</script>

</body>
</html>
